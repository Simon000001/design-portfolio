<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monolith / Collectible Furniture and Objects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#ECEAE5;
  --text:#28282A;
  --text-muted:rgba(40,40,42,0.4);
  --border:rgba(40,40,42,0.07);
  --card-bg:rgba(40,40,42,0.02);
  --overlay:rgba(236,234,229,0.97);
  --invert:0;
}
[data-theme="dark"]{
  --bg:#28282A;
  --text:#ECEAE5;
  --text-muted:rgba(236,234,229,0.35);
  --border:rgba(236,234,229,0.07);
  --card-bg:rgba(236,234,229,0.02);
  --overlay:rgba(40,40,42,0.97);
  --invert:1;
}
body{
  font-family:'Space Grotesk',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:background 0.5s ease,color 0.5s ease;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,h4,h5,h6{font-family:'Playfair Display',serif;font-weight:400;letter-spacing:-0.02em}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%;height:auto}
::selection{background:var(--text);color:var(--bg)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:2px}

/* ===== LOADING OVERLAY ===== */
.loading-overlay{
  position:fixed;inset:0;z-index:10000;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  transition:opacity 0.8s ease,visibility 0.8s ease;
  pointer-events:all;opacity:1;visibility:visible;
}
.loading-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-inner{text-align:center}
.loading-inner .mono-lith{
  font-family:'Playfair Display',serif;
  font-size:clamp(4rem,12vw,10rem);
  line-height:0.85;letter-spacing:-0.04em;
  color:var(--text);margin-bottom:1.5rem;
}
.loading-inner .mono-lith span{display:block}
.loading-inner .loading-bar-wrap{
  width:200px;height:1px;background:var(--border);margin:0 auto;overflow:hidden;
}
.loading-inner .loading-bar-fill{
  height:100%;width:0%;background:var(--text);
  transition:width 1.5s cubic-bezier(0.25,0.46,0.45,0.94);
}

/* ===== SCROLL INDICATOR ===== */
.scroll-indicator{
  position:fixed;top:0;left:0;height:1px;background:var(--text);
  z-index:1001;transition:width 0.1s ease;width:0%;
}

/* ===== TOP BAR ===== */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0.85rem 1.25rem;
  background:transparent;color:var(--text);
  transition:color 0.5s ease;
  mix-blend-mode:difference;
}
.top-bar-left{display:flex;align-items:center;gap:1.5rem;flex:0 0 auto}
.top-bar-logo{
  font-family:'Playfair Display',serif;
  font-size:0.85rem;letter-spacing:0.15em;text-transform:uppercase;
  font-weight:500;
}
.top-bar-info{
  display:flex;align-items:center;gap:0.75rem;
  font-size:0.65rem;letter-spacing:0.05em;text-transform:uppercase;
  font-weight:400;color:var(--text);
  opacity:0.7;
}
.top-bar-info .time-display{font-variant-numeric:tabular-nums}
.top-bar-center{position:absolute;left:50%;transform:translateX(-50%)}
.top-bar-center .percentage{
  font-size:0.65rem;letter-spacing:0.05em;font-weight:400;
  opacity:0.7;
}
.top-bar-right{display:flex;align-items:center;gap:1rem}
.num-nav-row{
  display:flex;align-items:center;gap:0.25rem;
}
.num-nav-row a{
  font-size:0.65rem;letter-spacing:0.02em;
  color:var(--text);opacity:0.35;transition:opacity 0.3s ease;
  line-height:1;padding:0.15rem 0.3rem;
}
.num-nav-row a::before{content:attr(data-num)'. '}
.num-nav-row a:hover,.num-nav-row a.active{opacity:1}

/* Dark Mode Toggle */
.dark-toggle{
  background:none;border:1px solid var(--text);border-radius:50%;
  width:24px;height:24px;cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s ease;overflow:hidden;
  opacity:0.35;font-size:0.65rem;
}
.dark-toggle:hover{opacity:1}
.dark-toggle .icon-wrap{position:relative;width:12px;height:12px}
.dark-toggle .icon-wrap span{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  transition:transform 0.4s cubic-bezier(0.68,-0.55,0.265,1.55),opacity 0.25s ease;
}
.dark-toggle .sun{transform:translateY(0);opacity:1}
.dark-toggle .moon{transform:translateY(100%);opacity:0}
[data-theme="dark"] .dark-toggle .sun{transform:translateY(-100%);opacity:0}
[data-theme="dark"] .dark-toggle .moon{transform:translateY(0);opacity:1}

/* ===== MAIN CONTENT ===== */
.main-content{opacity:0;transition:opacity 0.8s ease}
.main-content.visible{opacity:1}

/* ===== GALLERY SECTION ===== */
.gallery-section{padding-top:3.5rem}
.gallery-item{
  position:relative;display:block;overflow:hidden;
  border-bottom:1px solid var(--border);
}
.gallery-item:last-child{border-bottom:none}
.gallery-inner{
  display:grid;grid-template-columns:1fr 1fr;gap:0;
  min-height:80vh;
}
.gallery-item .gallery-img{
  position:relative;overflow:hidden;
  background:var(--card-bg);
}
.gallery-item .gallery-img img{
  width:100%;height:100%;object-fit:cover;
  display:block;
  transition:transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  filter:grayscale(0.1);
  min-height:50vh;
}
.gallery-item:hover .gallery-img img{transform:scale(1.025)}
.gallery-item .gallery-info{
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:2.5rem 2rem;
}
.gallery-item .gallery-number{
  font-size:0.6rem;letter-spacing:0.12em;color:var(--text-muted);
  text-transform:uppercase;font-weight:500;margin-bottom:0.3rem;
}
.gallery-item .gallery-catalog{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.1rem,2vw,1.6rem);
  letter-spacing:-0.01em;margin-bottom:0.25rem;
}
.gallery-item .gallery-sub{
  font-size:0.7rem;letter-spacing:0.05em;color:var(--text-muted);
  margin-bottom:0.5rem;
}
.gallery-item .gallery-price{
  font-size:0.85rem;font-weight:500;letter-spacing:0.02em;
}
.gallery-item .gallery-col-num{
  position:absolute;bottom:1.5rem;right:1.5rem;
  font-size:0.55rem;letter-spacing:0.1em;color:var(--text-muted);
  font-weight:500;
}

/* ===== SEE ALL SECTION ===== */
.see-all-section{
  display:flex;justify-content:space-between;align-items:center;
  padding:3rem 1.25rem;border-bottom:1px solid var(--border);
}
.see-all-section h2{
  font-size:clamp(1.2rem,2.5vw,1.8rem);
  letter-spacing:-0.02em;
}
.see-all-section .see-all-link{
  font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;
  opacity:0.5;transition:opacity 0.3s ease;display:flex;align-items:center;gap:0.5rem;
}
.see-all-section .see-all-link:hover{opacity:1}
.see-all-section .see-all-count{
  font-size:0.6rem;letter-spacing:0.05em;color:var(--text-muted);
}

/* ===== MORE MONOLITHS ===== */
.more-section{
  padding:3rem 1.25rem;border-bottom:1px solid var(--border);
}
.more-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:2rem;
}
.more-header h2{
  font-size:clamp(1.5rem,3vw,2.5rem);
  line-height:1;letter-spacing:-0.02em;
}
.more-header h2 span{display:block}
.more-header .more-count{
  font-size:0.6rem;letter-spacing:0.08em;color:var(--text-muted);
  font-weight:400;font-family:'Space Grotesk',sans-serif;
  text-transform:uppercase;white-space:nowrap;
}
.more-scroll{
  display:flex;gap:1px;overflow-x:auto;padding-bottom:1rem;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  scroll-snap-type:x mandatory;
}
.more-scroll::-webkit-scrollbar{display:none}
.more-item{
  flex:0 0 auto;width:clamp(240px,30vw,380px);
  scroll-snap-align:start;cursor:pointer;
}
.more-item .more-img-wrap{
  position:relative;width:100%;padding-bottom:100%;
  overflow:hidden;background:var(--card-bg);
}
.more-item .more-img-wrap img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
  filter:grayscale(0.1);
}
.more-item:hover .more-img-wrap img{transform:scale(1.04)}
.more-item .more-label{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:0.75rem;
}
.more-item .more-label .more-cat{
  font-size:0.55rem;letter-spacing:0.1em;color:var(--text-muted);
  text-transform:uppercase;font-weight:500;
}
.more-item .more-label .more-name{
  font-family:'Playfair Display',serif;font-size:0.85rem;
  letter-spacing:-0.01em;
}
.more-item .more-label .more-price{
  font-size:0.7rem;font-weight:500;letter-spacing:0.02em;
}

/* ===== SITE LINKS ===== */
.site-links{
  padding:2.5rem 1.25rem;border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
}
.site-links a{
  display:flex;justify-content:space-between;align-items:center;
  padding:1.25rem;font-size:0.75rem;letter-spacing:0.05em;
  transition:opacity 0.3s ease;border-right:1px solid var(--border);
}
.site-links a:last-child{border-right:none}
.site-links a:hover{opacity:0.5}
.site-links a .link-arrow{font-size:0.6rem;opacity:0.4}

/* ===== FOOTER ===== */
.footer{
  padding:2rem 1.25rem;
  display:grid;grid-template-columns:repeat(5,auto);gap:1rem;
  align-items:center;font-size:0.6rem;letter-spacing:0.05em;
  color:var(--text-muted);
}
.footer a{color:var(--text);transition:opacity 0.3s ease}
.footer a:hover{opacity:0.5}
.footer .footer-brand{color:var(--text);font-weight:500}
.footer .footer-right{display:flex;gap:1.5rem;align-items:center}
.footer .footer-right a{display:flex;align-items:center;gap:0.35rem}

/* ===== REVEAL ANIMATIONS ===== */
.reveal{
  opacity:0;transform:translateY(20px);
  transition:all 0.7s cubic-bezier(0.25,0.46,0.45,0.94);
}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:0.1s}
.reveal-delay-2{transition-delay:0.2s}
.reveal-delay-3{transition-delay:0.3s}
.reveal-delay-4{transition-delay:0.4s}
.reveal-delay-5{transition-delay:0.5s}
.reveal-delay-6{transition-delay:0.6s}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  .gallery-inner{grid-template-columns:1fr;min-height:auto}
  .gallery-item .gallery-img img{min-height:40vh}
  .gallery-item .gallery-info{padding:2rem 1.5rem}
  .gallery-item .gallery-col-num{display:none}
  .site-links{grid-template-columns:1fr}
  .footer{grid-template-columns:1fr 1fr;gap:0.75rem}
}
@media(max-width:768px){
  .top-bar{padding:0.65rem 1rem}
  .top-bar-logo{font-size:0.75rem}
  .top-bar-info .location{display:none}
  .num-nav-row a{font-size:0.6rem;padding:0.1rem 0.2rem}
  .num-nav-row a span{display:none}
  .num-nav-row a::before{content:attr(data-num)}
  .num-nav-row a::after{content:none}
  .gallery-item .gallery-info{padding:1.5rem 1rem}
  .more-item{width:clamp(200px,45vw,300px)}
  .footer{grid-template-columns:1fr;text-align:center;gap:0.5rem}
  .footer .footer-right{justify-content:center}
  .site-links{padding:1.5rem 0.75rem}
  .site-links a{padding:0.85rem 0.75rem;border-right:none;border-bottom:1px solid var(--border)}
  .site-links a:last-child{border-bottom:none}
  .see-all-section{padding:2rem 1rem;flex-direction:column;align-items:flex-start;gap:0.75rem}
  .more-section{padding:2rem 1rem}
}
@media(max-width:480px){
  .top-bar-info .time-display{display:none}
  .top-bar-center{display:none}
  .dark-toggle{width:20px;height:20px}
}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-inner">
    <div class="mono-lith">
      <span>Mono</span>

    </div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill" id="loadingBarFill"></div>
    </div>
  </div>
</div>

<!-- Scroll Indicator -->
<div class="scroll-indicator" id="scrollIndicator"></div>

<!-- Top Bar -->
<header class="top-bar" id="topBar">
  <div class="top-bar-left">
    <a href="#" class="top-bar-logo">Monolith</a>
    <div class="top-bar-info">
      <span class="time-display" id="timeDisplay">00:00</span>
      <span class="location">New York, NY</span>
    </div>
  </div>
  <div class="top-bar-center">
    <span class="percentage" id="scrollPercent">00%</span>
  </div>
  <div class="top-bar-right">
    <nav class="num-nav-row" id="numNavRow">
      <a href="#home" data-num="1" class="active"><span>Home</span></a>
      <a href="#gallery" data-num="2"><span>Index</span></a>
      <a href="#more" data-num="3"><span>Information</span></a>
    </nav>
    <button class="dark-toggle" id="darkToggle" aria-label="Turn on dark theme.">
      <div class="icon-wrap">
        <span class="sun">☀</span>

      </div>
    </button>
  </div>
</header>

<!-- Main Content -->
<div class="main-content" id="mainContent">

<!-- ===== HOME / GALLERY ===== -->
<section id="home" class="gallery-section">
  <div class="gallery-grid" id="galleryGrid">
    <!-- JS POPULATED -->
  </div>
</section>

<!-- ===== SEE ALL MONOLITHS ===== -->
<section id="gallery" class="see-all-section">
  <h2 class="reveal">All Products</h2>
  <a href="#" class="see-all-link reveal reveal-delay-1">See All Monoliths <span class="link-arrow">→</span></a>
  <span class="see-all-count reveal reveal-delay-2" id="productCount">0_06</span>
</section>

<!-- ===== MORE MONOLITHS ===== -->
<section id="more" class="more-section">
  <div class="more-header">
    <h2 class="reveal">
      <span>More</span>
      <span>Monoliths</span>
    </h2>
    <span class="more-count reveal reveal-delay-1" id="moreCount">05_Images</span>
  </div>
  <div class="more-scroll" id="moreScroll">
    <!-- JS POPULATED -->
  </div>
</section>

<!-- ===== SITE LINKS ===== -->
<div class="site-links">
  <a href="#" class="reveal">Monolith Trade <span class="link-arrow">→</span></a>
  <a href="mailto:info@monolith.nyc" class="reveal reveal-delay-1">Contact Us <span class="link-arrow">→</span></a>

<!-- ===== FOOTER ===== -->
<footer class="footer">
  <span class="footer-brand">Monolith</span>
  <span>All Rights Reserved 2024</span>
  <span>Contact <a href="mailto:info@monolith.nyc">info@monolith.nyc</a></span>
  <span>Designed In New York City, NY</span>
  <div class="footer-right">
    <a href="https://instagram.com/monolith.studio" target="_blank" rel="noopener">Instagram ↑</a>

  </div>
</footer>

</div><!-- /main-content -->

<script>
(function(){
'use strict';

// ===== PRODUCT DATA =====
const products = [
  { id:'M_013', name:'Dining Chair', material:'White Oak', price:'$2,400', desc:'Sculpted with bold curvature', img:'monolith-chair', no:'001' },
  { id:'M_001', name:'Chair', material:'Walnut', price:'$1,800', desc:'A classic monolithic silhouette', img:'monolith-chair2', no:'002' },
  { id:'M_005', name:'Bench', material:'Travertine, steel', price:'$3,600', desc:'Sculptural bench form', img:'monolith-bench', no:'003' },
  { id:'M_007', name:'Lounge Chair', material:'Lava Rock, leather', price:'$4,200', desc:'Deep, grounded lounge form', img:'monolith-lounge', no:'004' },
  { id:'M_010', name:'Dining Table', material:'White Oak, marble', price:'$6,800', desc:'A monolithic table form', img:'monolith-table2', no:'005' },
  { id:'M_004', name:'Lamp', material:'Brushed aluminum', price:'$2,600', desc:'Vertical light monolith', img:'monolith-lamp2', no:'006' }
];

const moreItems = [
  { id:'M_014', name:'Lamp', img:'monolith-lamp3' },
  { id:'M_002', name:'Side Table', img:'monolith-side' },
  { id:'M_008', name:'Console', img:'monolith-console2' },
  { id:'M_009', name:'Shelf', img:'monolith-shelf2' },
  { id:'M_006', name:'Stool', img:'monolith-stool2' }
];

const unsplashUrls = [
  'https://images.unsplash.com/photo-1758957701419-2c6e266f7988?w=800&h=600&fit=crop',
  'https://images.unsplash.com/photo-1778731525495-c225978fe442?w=800&h=600&fit=crop',
  'https://images.unsplash.com/photo-1741851376964-1a1ec9a14e68?w=800&h=600&fit=crop',
  'https://images.unsplash.com/photo-1771888703723-01d85da1dae1?w=800&h=600&fit=crop',
  'https://images.unsplash.com/photo-1618220179428-22790b461013?w=800&h=600&fit=crop',
  'https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=800&h=600&fit=crop',
  'https://images.unsplash.com/photo-1721903832111-2798f5d2911d?w=800&h=600&fit=crop',
  'https://images.unsplash.com/photo-1615874959474-d609969a20ed?w=800&h=600&fit=crop',
  'https://images.unsplash.com/photo-1616137466211-f939a420be84?w=800&h=600&fit=crop',
  'https://images.unsplash.com/photo-1616048056617-93b5a3408a49?w=800&h=600&fit=crop'
];

// ===== DOM REFS =====
const timeDisplay = document.getElementById('timeDisplay');
const scrollPercent = document.getElementById('scrollPercent');
const scrollIndicator = document.getElementById('scrollIndicator');
const darkToggle = document.getElementById('darkToggle');
const galleryGrid = document.getElementById('galleryGrid');
const moreScroll = document.getElementById('moreScroll');
const productCount = document.getElementById('productCount');
const moreCount = document.getElementById('moreCount');
const navLinks = document.querySelectorAll('.num-nav-row a');
const sections = document.querySelectorAll('section[id]');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingBarFill = document.getElementById('loadingBarFill');
const mainContent = document.getElementById('mainContent');

// ===== SET COUNTS =====
productCount.textContent = '0_' + String(products.length).padStart(2,'0');
moreCount.textContent = String(moreItems.length).padStart(2,'0') + '_Images';

// ===== TIME UPDATE =====
function updateTime(){
  const d=new Date();
  timeDisplay.textContent=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
}
updateTime();
setInterval(updateTime,1000);

// ===== SCROLL TRACKING =====
function updateScroll(){
  const scrollTop=window.scrollY;
  const docHeight=document.documentElement.scrollHeight-window.innerHeight;
  const pct=docHeight>0?Math.round((scrollTop/docHeight)*100):0;
  const pctStr=String(pct).padStart(2,'0')+'%';
  scrollPercent.textContent=pctStr;
  scrollIndicator.style.width=pct+'%';

  // Nav active state
  let current='';
  sections.forEach(sec=>{
    const top=sec.offsetTop-250;
    const bottom=top+sec.offsetHeight;
    if(scrollTop>=top&&scrollTop<bottom)current=sec.id;
  });
  navLinks.forEach(a=>{
    a.classList.toggle('active',a.getAttribute('href')==='#'+current);
  });
}
window.addEventListener('scroll',updateScroll,{passive:true});
window.addEventListener('resize',updateScroll,{passive:true});

// ===== DARK MODE =====
function toggleTheme(){
  const html=document.documentElement;
  const current=html.getAttribute('data-theme');
  const next=current==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('monolith-theme',next);
  darkToggle.setAttribute('aria-label',next==='dark'?'Turn on light theme.':'Turn on dark theme.');
}
darkToggle.addEventListener('click',toggleTheme);
const savedTheme=localStorage.getItem('monolith-theme');
if(savedTheme){
  document.documentElement.setAttribute('data-theme',savedTheme);
  darkToggle.setAttribute('aria-label',savedTheme==='dark'?'Turn on light theme.':'Turn on dark theme.');
}

// ===== BUILD GALLERY =====
function buildGallery(){
  let html='';
  products.forEach((p,i)=>{
    const even=i%2===0;
    html+=`
      <div class="gallery-item reveal reveal-delay-${Math.min(i%6+1,3)}">
        <div class="gallery-inner" style="grid-template-columns:${even?'1fr 1fr':'1fr 1fr'}">
          ${even?`
          <div class="gallery-img">
            <img src="${unsplashUrls[i]}" alt="${p.name}" loading="${i<2?'eager':'lazy'}" style="height:100%">
          </div>
          <div class="gallery-info">
            <div class="gallery-number">${p.no}</div>
            <div class="gallery-catalog">${p.id} ${p.name}</div>
            <div class="gallery-sub">${p.material}</div>
            <div class="gallery-price">${p.price}</div>
          </div>`:`
          <div class="gallery-info">
            <div class="gallery-number">${p.no}</div>
            <div class="gallery-catalog">${p.id} ${p.name}</div>
            <div class="gallery-sub">${p.material}</div>
            <div class="gallery-price">${p.price}</div>
          </div>
          <div class="gallery-img">
            <img src="${unsplashUrls[i]}" alt="${p.name}" loading="${i<2?'eager':'lazy'}" style="height:100%">
          </div>`}
        </div>
        <span class="gallery-col-num">${String(i+1).padStart(3,'0')}</span>
      </div>`;
  });
  galleryGrid.innerHTML=html;
}

// ===== BUILD MORE MONOLITHS =====
function buildMore(){
  let html='';
  moreItems.forEach((item,i)=>{
    const num=String(i+1).padStart(3,'0');
    html+=`
      <div class="more-item reveal reveal-delay-${Math.min(i%5+1,2)}">
        <div class="more-img-wrap">
          <img src="${unsplashUrls[Math.min(6 + i, 9)]}" alt="${item.name}" loading="lazy">
        </div>
        <div class="more-label">
          <span class="more-cat">${num} / ${item.id}</span>
          <span class="more-name">${item.name}</span>
        </div>
      </div>`;
  });
  moreScroll.innerHTML=html;
}

// ===== NUMBER COUNTER ANIMATION =====
function animateCounter(el,target,duration){
  const start=performance.now();
  function step(now){
    const elapsed=now-start;
    const progress=Math.min(elapsed/duration,1);
    const eased=1-Math.pow(1-progress,3);
    const current=Math.round(eased*target);
    el.textContent=String(current).padStart(2,'0')+'%';
    if(progress<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ===== INTERSECTION OBSERVER =====
function setupRevealObserver(){
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
      }
    });
  },{threshold:0.08,rootMargin:'0px 0px -40px 0px'});

  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
}

// ===== SMOOTH SCROLL FOR NAV =====
navLinks.forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    const target=document.querySelector(a.getAttribute('href'));
    if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
  });
});

// ===== LOADING SEQUENCE =====
function init(){
  // Build content first
  buildGallery();
  buildMore();

  // Animate loading bar
  requestAnimationFrame(()=>{
    loadingBarFill.style.width='100%';
  });

  // After loading bar fills, hide overlay and show content
  setTimeout(()=>{
    loadingOverlay.classList.add('hidden');
    mainContent.classList.add('visible');

    // Setup observers
    setupRevealObserver();

    // Initial scroll update
    updateScroll();

    // Animate percentage counter
    const pctEl=scrollPercent;
    animateCounter(pctEl,0,400);
    setTimeout(()=>{
      const docH=document.documentElement.scrollHeight-window.innerHeight;
      const pct=docH>0?Math.round((window.scrollY/docH)*100):0;
      animateCounter(pctEl,pct,400);
    },500);

    // Check visible reveals after layout
    setTimeout(()=>{
      document.querySelectorAll('.reveal').forEach(el=>{
        const rect=el.getBoundingClientRect();
        if(rect.top<window.innerHeight-40&&rect.bottom>0)el.classList.add('visible');
      });
    },300);
  },1800);
}

// Wait for everything
if(document.readyState==='complete'){
  init();
}else{
  window.addEventListener('load',init);
}

// ===== RESIZE REVEAL CHECK =====
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    document.querySelectorAll('.reveal:not(.visible)').forEach(el=>{
      const rect=el.getBoundingClientRect();
      if(rect.top<window.innerHeight-40&&rect.bottom>0)el.classList.add('visible');
    });
  },250);
});

console.log('Monolith // Loaded — '+new Date().toLocaleString());

})();
</script>
