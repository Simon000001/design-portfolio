<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;
  --card:#ffffff;
  --border:rgba(0,0,0,0.06);
  --text-heading:#111111;
  --text-body:#666666;
  --transition:0.4s cubic-bezier(0.4,0,0.2,1);
  --shadow:0 2px 12px rgba(0,0,0,0.04);
  --shadow-hover:0 20px 50px rgba(0,0,0,0.08);
  --primary:#111111;
  --primary-hover:#333333;
  --radius:12px;
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text-body);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
  line-height:1.6;
  min-height:100vh;
}
img{max-width:100%;height:auto;display:block}
a{text-decoration:none;color:inherit}

/* ───── Nav ───── */
.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
  max-width:1200px;
  margin:0 auto;
  border-bottom:1px solid var(--border);
}
.nav-title{
  font-size:15px;
  font-weight:500;
  color:var(--text-heading);
  letter-spacing:-0.02em;
}
.nav-back{
  font-size:13px;
  color:var(--text-body);
  transition:color 0.2s;
  display:flex;
  align-items:center;
  gap:4px;
}
.nav-back:hover{color:var(--text-heading)}
.nav-back svg{width:14px;height:14px;flex-shrink:0}

/* ───── Container ───── */
.container{max-width:1200px;margin:0 auto;padding:0 24px}

/* ───── Tabs ───── */
.tab-bar{
  display:flex;
  justify-content:center;
  gap:6px;
  padding:24px 0 32px;
}
.tab-btn{
  padding:8px 22px;
  border-radius:50px;
  border:1px solid var(--border);
  background:var(--card);
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:500;
  color:var(--text-body);
  cursor:pointer;
  transition:all 0.2s;
  -webkit-font-smoothing:antialiased;
}
.tab-btn:hover{border-color:rgba(0,0,0,0.15);color:var(--text-heading)}
.tab-btn.active{
  background:var(--text-heading);
  color:#fff;
  border-color:var(--text-heading);
}
.tab-content{display:none}
.tab-content.active{display:block}

/* ───── Section Title ───── */
.section-title{
  font-size:22px;
  font-weight:500;
  color:var(--text-heading);
  letter-spacing:-0.03em;
  margin-bottom:20px;
}

/* ───── Color Count Selector ───── */
.count-row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:12px;
}
.count-btn{
  width:32px;
  height:32px;
  border-radius:50px;
  border:1px solid var(--border);
  background:var(--card);
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  color:var(--text-body);
  cursor:pointer;
  transition:all 0.2s;
  -webkit-font-smoothing:antialiased;
  display:flex;
  align-items:center;
  justify-content:center;
}
.count-btn:hover{border-color:rgba(0,0,0,0.15);color:var(--text-heading)}
.count-btn.active{
  background:#111;
  color:#fff;
  border-color:#111;
}
.count-label{
  font-size:12px;
  color:var(--text-body);
  display:flex;
  align-items:center;
  margin-right:4px;
}

/* ───── Theory Buttons ───── */
.theory-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:24px;
}
.theory-btn{
  padding:7px 16px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card);
  font-family:'Inter',sans-serif;
  font-size:12px;
  font-weight:500;
  color:var(--text-body);
  cursor:pointer;
  transition:all 0.2s;
  -webkit-font-smoothing:antialiased;
}
.theory-btn:hover{border-color:rgba(0,0,0,0.15);color:var(--text-heading)}
.theory-btn.active{
  background:var(--text-heading);
  color:#fff;
  border-color:var(--text-heading);
}

/* ───── Generate Button ───── */
.gen-row{display:flex;gap:12px;align-items:center;margin-bottom:28px}
.btn-generate{
  padding:9px 24px;
  border-radius:10px;
  border:none;
  background:var(--text-heading);
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
  -webkit-font-smoothing:antialiased;
}
.btn-generate:hover{background:#000}
.btn-generate:active{transform:scale(0.97)}
.btn-generate:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* ───── Palettes Grid ───── */
.palettes-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.palette-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
}
.palette-swatches{display:flex;height:64px}
.palette-swatch{
  flex:1;
  position:relative;
}
.palette-codes{
  display:flex;
  padding:10px 8px;
  gap:2px;
}
.palette-code{
  flex:1;
  font-size:10px;
  font-weight:500;
  color:var(--text-body);
  text-align:center;
  font-family:'SF Mono','Consolas','Monaco',monospace;
  letter-spacing:0.02em;
}

/* ───── Ding Animation ───── */
@keyframes dingPulse {
  0% { box-shadow: 0 0 0 0 rgba(17,17,17,0.15); transform: scale(1); }
  50% { box-shadow: 0 0 0 12px rgba(17,17,17,0); transform: scale(1.015); }
  100% { box-shadow: 0 0 0 0 rgba(17,17,17,0); transform: scale(1); }
}
.ding-anim .palette-card {
  animation: dingPulse 0.5s ease;
}

/* ───── Photo Categories ───── */
.cat-grid{

  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:28px;
}

}

.cat-card svg{width:22px;height:22px;color:var(--text-heading);display:block;flex-shrink:0}
.cat-label{

  font-weight:500;

  text-align:center;

}

/* ───── Photo Grid (Placeholder) ───── */

/* ───── Footer ───── */
footer{

/* ───── Responsive ───── */

</style>

<script>
(function(){
  // ───── Color Palette Generator ─────
  var palettesGrid = document.getElementById('palettesGrid');
  var generateBtn = document.getElementById('generateBtn');
  var theoryBtns = document.querySelectorAll('.theory-btn');
  var countBtns = document.querySelectorAll('.count-btn');
  var activeTheory = 'complementary';
  var colorCount = 5;
  var animating = false;

  function hslToHex(h, s, l){
    // Normalize s and l from 0-100 to 0-1
    s = s / 100;
    l = l / 100;
    h = ((h % 360) + 360) % 360;
    var c = (1 - Math.abs(2 * l - 1)) * s;
    var x = c * (1 - Math.abs((h / 60) % 2 - 1));
    var m = l - c / 2;
    var r, g, b;
    if(h < 60){r=c;g=x;b=0}
    else if(h < 120){r=x;g=c;b=0}
    else if(h < 180){r=0;g=c;b=x}
    else if(h < 240){r=0;g=x;b=c}
    else if(h < 300){r=x;g=0;b=c}
    else{r=c;g=0;b=x}
    var ri = Math.round((r + m) * 255);
    var gi = Math.round((g + m) * 255);
    var bi = Math.round((b + m) * 255);
    return '#' + [ri,gi,bi].map(function(v){
      return v.toString(16).padStart(2,'0');
    }).join('');
  }

  function generatePalette(theory, count){
    var baseHue = Math.random() * 360;
    var sat = 55 + Math.random() * 30;
    var lit = 40 + Math.random() * 20;
    var colors = [];

    var hues = [];
    switch(theory){
      case 'complementary':
        hues = [baseHue, baseHue + 180];
        break;
      case 'analogous':
        hues = [baseHue - 30, baseHue, baseHue + 30];
        break;
      case 'triadic':
        hues = [baseHue, baseHue + 120, baseHue + 240];
        break;
      case 'tetradic':
        hues = [baseHue, baseHue + 90, baseHue + 180, baseHue + 270];
        break;
      case 'monochromatic':
        for(var mi = 0; mi < count; mi++){
          hues.push(baseHue);
        }
        break;
      case 'split-complementary':
        hues = [baseHue, baseHue + 150, baseHue + 210];
        break;
    }

    for(var i = 0; i < count; i++){
      var h;
      if(theory === 'monochromatic'){
        var half = Math.floor(count / 2);
        var sVar = sat + (i - half) * 6 + (Math.random() * 8 - 4);
        var lVar = lit + (i - half) * 7 + (Math.random() * 6 - 3);
        colors.push({
          hex: hslToHex(hues[i], clamp(sVar, 15, 90), clamp(lVar, 15, 85))
        });
        continue;
      }

      if(hues.length === 1 || count === 1){
        h = hues[0];
      } else if(count <= hues.length){
        // Pick evenly from available hues
        var idx = Math.floor(i * (hues.length / count));
        h = hues[Math.min(idx, hues.length - 1)];
      } else {
        // Interpolate between hues for more colors than base hues
        var step = (hues.length - 1) / (count - 1);
        var exactIdx = i * step;
        var idxLow = Math.floor(exactIdx);
        var idxHigh = Math.min(idxLow + 1, hues.length - 1);
        var t = exactIdx - idxLow;
        h = hues[idxLow] + (hues[idxHigh] - hues[idxLow]) * t;
      }

      var sVar = sat + (Math.random() * 16 - 8);
      var lVar = lit + (Math.random() * 14 - 7);
      colors.push({
        hex: hslToHex(h, clamp(sVar, 20, 90), clamp(lVar, 20, 80))
      });
    }
    return colors;
  }

  function clamp(v, min, max){return Math.max(min, Math.min(max, v))}

  function renderPalettes(){
    var realPalettes = [];
    for(var p = 0; p < 6; p++){
      realPalettes.push(generatePalette(activeTheory, colorCount));
    }

    // Create temp structure with random cycling colors
    var html = '';
    for(var p = 0; p < 6; p++){
      html += '<div class="palette-card">';
      html += '<div class="palette-swatches">';
      for(var s = 0; s < colorCount; s++){
        var rh = Math.random() * 360;
        var rs = 40 + Math.random() * 40;
        var rl = 30 + Math.random() * 40;
        html += '<div class="palette-swatch" style="background:' + hslToHex(rh, rs, rl) + '"></div>';
      }
      html += '</div>';
      html += '<div class="palette-codes">';
      for(var c = 0; c < colorCount; c++){
        html += '<span class="palette-code">------</span>';
      }
      html += '</div>';
      html += '</div>';
    }
    palettesGrid.innerHTML = html;

    var swatches = palettesGrid.querySelectorAll('.palette-swatch');

    // Cycle random colors every 80ms
    var interval = setInterval(function(){
      swatches.forEach(function(el){
        var h = Math.random() * 360;
        var s = 40 + Math.random() * 40;
        var l = 30 + Math.random() * 40;
        el.style.backgroundColor = hslToHex(h, s, l);
      });
    }, 80);

    // After 1.5s, show the real palette with ding effect
    setTimeout(function(){
      clearInterval(interval);

      var finalHtml = '';
      for(var p = 0; p < 6; p++){
        var pal = realPalettes[p];
        finalHtml += '<div class="palette-card">';
        finalHtml += '<div class="palette-swatches">';
        for(var s = 0; s < pal.length; s++){
          finalHtml += '<div class="palette-swatch" style="background:' + pal[s].hex + '"></div>';
        }
        finalHtml += '</div>';
        finalHtml += '<div class="palette-codes">';
        for(var c = 0; c < pal.length; c++){
          finalHtml += '<span class="palette-code">' + pal[c].hex + '</span>';
        }
        finalHtml += '</div>';
        finalHtml += '</div>';
      }
      palettesGrid.innerHTML = finalHtml;

      // Ding animation
      palettesGrid.classList.add('ding-anim');
      setTimeout(function(){
        palettesGrid.classList.remove('ding-anim');
      }, 600);

      animating = false;
      generateBtn.disabled = false;
    }, 1500);
  }

  // Color count buttons
  countBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      countBtns.forEach(function(b){b.classList.remove('active')});
      this.classList.add('active');
      colorCount = parseInt(this.getAttribute('data-count'), 10);
    });
  });

  theoryBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      if(animating) return;
      theoryBtns.forEach(function(b){b.classList.remove('active')});
      this.classList.add('active');
      activeTheory = this.getAttribute('data-theory');
      renderPalettes();
    });
  });

  generateBtn.addEventListener('click', function(){
    if(animating) return;
    renderPalettes();
  });

  // Initial render
  renderPalettes();

  // ───── Photo Theme Inspiration ─────
  var catGrid = document.getElementById('catGrid');
  var photoGrid = document.getElementById('photoGrid');
  var shuffleBtn = document.getElementById('shuffleBtn');
  var activeCategory = 'portrait';

  function loadPhotos(category){
    var html = '';
    for(var i = 0; i < 6; i++){
      html += '<div class="photo-placeholder-card">';
      html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
      html += '<span class="photo-placeholder-note">' + category.charAt(0).toUpperCase() + category.slice(1) + ' inspiration</span>';
      html += '<span class="photo-placeholder-cta">Connect API</span>';
      html += '</div>';
    }
    photoGrid.innerHTML = html;
  }

  catGrid.querySelectorAll('.cat-card').forEach(function(card){
    card.addEventListener('click', function(){
      catGrid.querySelectorAll('.cat-card').forEach(function(c){c.classList.remove('active')});
      this.classList.add('active');
      activeCategory = this.getAttribute('data-category');
      loadPhotos(activeCategory);
    });
  });

  // Activate first category by default
  catGrid.querySelector('.cat-card').classList.add('active');

  shuffleBtn.addEventListener('click', function(){
    loadPhotos(activeCategory);
  });

  // Initial load
  loadPhotos('portrait');

  // ───── Tab Switching ─────
  var tabBtns = document.querySelectorAll('.tab-btn');
  var tabContent = document.getElementById('tab-color');

  // Single view - no tab switching needed
})();
</script>
</body>
</html>
