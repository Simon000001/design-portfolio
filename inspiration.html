<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspiration Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;
  --card:#ffffff;
  --border:rgba(0,0,0,0.06);
  --text-heading:#111111;
  --text-body:#666666;
  --transition:0.4s cubic-bezier(0.4,0,0.2,1);
  --shadow:0 2px 12px rgba(0,0,0,0.04);
  --shadow-hover:0 20px 50px rgba(0,0,0,0.08);
  --primary:#111111;
  --primary-hover:#333333;
  --radius:12px;
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text-body);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
  line-height:1.6;
  min-height:100vh;
}
img{max-width:100%;height:auto;display:block}
a{text-decoration:none;color:inherit}

/* ───── Nav ───── */
.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
  max-width:1200px;
  margin:0 auto;
  border-bottom:1px solid var(--border);
}
.nav-title{
  font-size:15px;
  font-weight:500;
  color:var(--text-heading);
  letter-spacing:-0.02em;
}
.nav-back{
  font-size:13px;
  color:var(--text-body);
  transition:color 0.2s;
  display:flex;
  align-items:center;
  gap:4px;
}
.nav-back:hover{color:var(--text-heading)}
.nav-back svg{width:14px;height:14px;flex-shrink:0}

/* ───── Container ───── */
.container{max-width:1200px;margin:0 auto;padding:0 24px}

/* ───── Tabs ───── */
.tab-bar{
  display:flex;
  justify-content:center;
  gap:6px;
  padding:24px 0 32px;
}
.tab-btn{
  padding:8px 22px;
  border-radius:50px;
  border:1px solid var(--border);
  background:var(--card);
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:500;
  color:var(--text-body);
  cursor:pointer;
  transition:all 0.2s;
  -webkit-font-smoothing:antialiased;
}
.tab-btn:hover{border-color:rgba(0,0,0,0.15);color:var(--text-heading)}
.tab-btn.active{
  background:var(--text-heading);
  color:#fff;
  border-color:var(--text-heading);
}
.tab-content{display:none}
.tab-content.active{display:block}

/* ───── Section Title ───── */
.section-title{
  font-size:22px;
  font-weight:500;
  color:var(--text-heading);
  letter-spacing:-0.03em;
  margin-bottom:20px;
}

/* ───── Theory Buttons ───── */
.theory-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:24px;
}
.theory-btn{
  padding:7px 16px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card);
  font-family:'Inter',sans-serif;
  font-size:12px;
  font-weight:500;
  color:var(--text-body);
  cursor:pointer;
  transition:all 0.2s;
  -webkit-font-smoothing:antialiased;
}
.theory-btn:hover{border-color:rgba(0,0,0,0.15);color:var(--text-heading)}
.theory-btn.active{
  background:var(--text-heading);
  color:#fff;
  border-color:var(--text-heading);
}

/* ───── Generate Button ───── */
.gen-row{display:flex;gap:12px;align-items:center;margin-bottom:28px}
.btn-generate{
  padding:9px 24px;
  border-radius:10px;
  border:none;
  background:var(--text-heading);
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
  -webkit-font-smoothing:antialiased;
}
.btn-generate:hover{background:#000}
.btn-generate:active{transform:scale(0.97)}

/* ───── Palettes Grid ───── */
.palettes-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.palette-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
}
.palette-swatches{display:flex;height:64px}
.palette-swatch{
  flex:1;
  position:relative;
}
.palette-codes{
  display:flex;
  padding:10px 8px;
  gap:2px;
}
.palette-code{
  flex:1;
  font-size:10px;
  font-weight:500;
  color:var(--text-body);
  text-align:center;
  font-family:'SF Mono','Consolas','Monaco',monospace;
  letter-spacing:0.02em;
}

/* ───── Photo Categories ───── */
.cat-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:28px;
}
.cat-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:18px 8px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;
  transition:all 0.2s;
  box-shadow:var(--shadow);
  -webkit-user-select:none;
  user-select:none;
}
.cat-card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-hover);
  border-color:rgba(0,0,0,0.12);
}
.cat-card.active{
  border:1.5px solid var(--text-heading);
  background:rgba(0,0,0,0.015);
}
.cat-card svg{width:22px;height:22px;color:var(--text-heading);display:block;flex-shrink:0}
.cat-label{
  font-size:11px;
  font-weight:500;
  color:var(--text-body);
  text-align:center;
  line-height:1.2;
}

/* ───── Photo Grid ───── */
.photo-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-bottom:28px;
}
.photo-grid img{
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:#f0f0f0;
  transition:transform 0.3s ease;
}
.photo-grid img:hover{transform:scale(1.015)}

/* ───── Footer ───── */
footer{
  padding:40px 24px;
  text-align:center;
  border-top:1px solid var(--border);
  font-size:13px;
  color:var(--text-body);
  margin-top:40px;
}

/* ───── Responsive ───── */
@media(max-width:900px){
  .palettes-grid{grid-template-columns:repeat(2,1fr)}
  .photo-grid{grid-template-columns:repeat(2,1fr)}
  .cat-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:600px){
  .container{padding:0 16px}
  .nav{padding:14px 16px}
  .nav-title{font-size:14px}
  .palettes-grid{grid-template-columns:1fr}
  .photo-grid{grid-template-columns:1fr}
  .cat-grid{grid-template-columns:repeat(2,1fr)}
  .tab-btn{font-size:13px;padding:7px 16px}
  .section-title{font-size:19px}
  .theory-row{gap:6px}
  .theory-btn{font-size:11px;padding:6px 12px}
}
@media(max-width:375px){
  .nav{padding:12px 14px;flex-wrap:wrap;gap:8px}
  .nav-title{font-size:13px}
  .nav-back{font-size:12px}
  .tab-bar{gap:4px}
  .tab-btn{font-size:12px;padding:6px 14px}
  .cat-grid{gap:8px}
  .cat-card{padding:14px 6px}
  .cat-label{font-size:10px}
  .section-title{font-size:17px}
}

/* ───── Animations ───── */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.palette-card,.photo-grid img{animation:fadeIn 0.4s ease both}
.photo-grid img:nth-child(2){animation-delay:0.05s}
.photo-grid img:nth-child(3){animation-delay:0.1s}
.photo-grid img:nth-child(4){animation-delay:0.15s}
.photo-grid img:nth-child(5){animation-delay:0.2s}
.photo-grid img:nth-child(6){animation-delay:0.25s}
</style>
</head>
<body>

<!-- ───── Nav ───── -->
<nav class="nav">
  <span class="nav-title">Inspiration Tool</span>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="19 12 5 12"/><polyline points="11 18 5 12 11 6"/></svg>
    Back to Portfolio
  </a>
</nav>

<div class="container">

  <!-- ───── Tab Switcher ───── -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="color">Color Palette</button>
    <button class="tab-btn" data-tab="photo">Photo Theme</button>
  </div>

  <!-- ──── Tab 1: Color Palette Generator ──── -->
  <div class="tab-content active" id="tab-color">
    <h2 class="section-title">Color Palette Generator</h2>

    <div class="theory-row" id="theoryRow">
      <button class="theory-btn active" data-theory="complementary">Complementary</button>
      <button class="theory-btn" data-theory="analogous">Analogous</button>
      <button class="theory-btn" data-theory="triadic">Triadic</button>
      <button class="theory-btn" data-theory="tetradic">Tetradic</button>
      <button class="theory-btn" data-theory="monochromatic">Monochromatic</button>
      <button class="theory-btn" data-theory="split-complementary">Split-Complementary</button>
    </div>

    <div class="gen-row">
      <button class="btn-generate" id="generateBtn">Generate</button>
    </div>

    <div class="palettes-grid" id="palettesGrid"></div>
  </div>

  <!-- ──── Tab 2: Photo Theme Inspiration ──── -->
  <div class="tab-content" id="tab-photo">
    <h2 class="section-title">Photo Theme Inspiration</h2>

    <div class="cat-grid" id="catGrid">
      <div class="cat-card" data-category="portrait">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-8 8-8s8 4 8 8"/></svg>
        <span class="cat-label">Portrait</span>
      </div>
      <div class="cat-card" data-category="landscape">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-6 4 5 4-7 5 8"/><rect x="2" y="3" width="20" height="18" rx="2"/></svg>
        <span class="cat-label">Landscape</span>
      </div>
      <div class="cat-card" data-category="nature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 2 5 5 5 9c0 3 2 6 7 13 5-7 7-10 7-13 0-4-3-7-7-7z"/></svg>
        <span class="cat-label">Nature</span>
      </div>
      <div class="cat-card" data-category="urban">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="4" height="14"/><rect x="10" y="3" width="4" height="18"/><rect x="17" y="9" width="4" height="12"/></svg>
        <span class="cat-label">Urban</span>
      </div>
      <div class="cat-card" data-category="macro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
        <span class="cat-label">Macro</span>
      </div>
      <div class="cat-card" data-category="street">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="21" x2="21" y2="21"/><line x1="9" y1="21" x2="9" y2="9"/><line x1="15" y1="21" x2="15" y2="3"/><rect x="6" y="3" width="12" height="4" rx="1"/></svg>
        <span class="cat-label">Street</span>
      </div>
      <div class="cat-card" data-category="wildlife">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="2"/><circle cx="15" cy="9" r="2"/><path d="M3 15c3-2 7-2 9 0 2-2 6-2 9 0"/><path d="M3 19c3-2 7-2 9 0 2-2 6-2 9 0"/></svg>
        <span class="cat-label">Wildlife</span>
      </div>
      <div class="cat-card" data-category="architecture">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 10 22 22 2 22 2 10 12 2"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <span class="cat-label">Architecture</span>
      </div>
      <div class="cat-card" data-category="food">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8c0 3.3-2.7 6-6 6s-6-2.7-6-6"/><path d="M12 2v12"/><path d="M8 14v4c0 1.1 0.9 2 2 2h4c1.1 0 2-0.9 2-2v-4"/><path d="M14 22v-2"/></svg>
        <span class="cat-label">Food</span>
      </div>
      <div class="cat-card" data-category="abstract">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M6 12c0-3 2-6 6-6s6 3 6 6"/><path d="M12 6c-3 0-6 2-6 6"/></svg>
        <span class="cat-label">Abstract</span>
      </div>
    </div>

    <div class="gen-row">
      <button class="btn-generate" id="shuffleBtn">Shuffle</button>
    </div>

    <div class="photo-grid" id="photoGrid"></div>
  </div>

</div>

<footer>
  <p>Inspiration Tool</p>
</footer>

<script>
(function(){
  // ───── Color Palette Generator ─────
  var palettesGrid = document.getElementById('palettesGrid');
  var generateBtn = document.getElementById('generateBtn');
  var theoryBtns = document.querySelectorAll('.theory-btn');
  var activeTheory = 'complementary';

  function hslToHex(h, s, l){
    h = ((h % 360) + 360) % 360;
    var c = (1 - Math.abs(2 * l - 1)) * s;
    var x = c * (1 - Math.abs((h / 60) % 2 - 1));
    var m = l - c / 2;
    var r, g, b;
    if(h < 60){r=c;g=x;b=0}
    else if(h < 120){r=x;g=c;b=0}
    else if(h < 180){r=0;g=c;b=x}
    else if(h < 240){r=0;g=x;b=c}
    else if(h < 300){r=x;g=0;b=c}
    else{r=c;g=0;b=x}
    var ri = Math.round((r + m) * 255);
    var gi = Math.round((g + m) * 255);
    var bi = Math.round((b + m) * 255);
    return '#' + [ri,gi,bi].map(function(v){
      return v.toString(16).padStart(2,'0');
    }).join('');
  }

  function generatePalette(theory){
    var baseHue = Math.random() * 360;
    var sat = 55 + Math.random() * 30;
    var lit = 40 + Math.random() * 20;
    var colors = [];

    var hues = [];
    switch(theory){
      case 'complementary':
        hues = [baseHue, baseHue + 180];
        break;
      case 'analogous':
        hues = [baseHue - 30, baseHue, baseHue + 30];
        break;
      case 'triadic':
        hues = [baseHue, baseHue + 120, baseHue + 240];
        break;
      case 'tetradic':
        hues = [baseHue, baseHue + 90, baseHue + 180, baseHue + 270];
        break;
      case 'monochromatic':
        hues = [baseHue, baseHue, baseHue, baseHue, baseHue];
        break;
      case 'split-complementary':
        hues = [baseHue, baseHue + 150, baseHue + 210];
        break;
    }

    // If we have fewer than 5 hues, interpolate/extend to 5
    for(var i = 0; i < 5; i++){
      var h;
      if(theory === 'monochromatic'){
        // Vary saturation/lightness for monochromatic
        var sVar = sat + (i - 2) * 6 + (Math.random() * 8 - 4);
        var lVar = lit + (i - 2) * 7 + (Math.random() * 6 - 3);
        colors.push({
          hex: hslToHex(hues[i], clamp(sVar, 15, 90), clamp(lVar, 15, 85))
        });
        continue;
      }
      if(hues.length === 2){
        // Complementary: interleave middle colors
        if(i === 0 || i === 3) h = hues[0];
        else if(i === 1 || i === 4) h = hues[1];
        else h = (hues[0] + hues[1]) / 2;
      } else if(hues.length === 3){
        var step = 4 / (hues.length - 1);
        var idx = Math.min(Math.floor(i / step), hues.length - 1);
        h = hues[idx];
      } else {
        h = hues[i % hues.length];
      }

      var sVar = sat + (Math.random() * 16 - 8);
      var lVar = lit + (Math.random() * 14 - 7);
      colors.push({
        hex: hslToHex(h, clamp(sVar, 20, 90), clamp(lVar, 20, 80))
      });
    }
    return colors;
  }

  function clamp(v, min, max){return Math.max(min, Math.min(max, v))}

  function renderPalettes(){
    var html = '';
    for(var p = 0; p < 6; p++){
      var pal = generatePalette(activeTheory);
      html += '<div class="palette-card">';
      html += '<div class="palette-swatches">';
      for(var s = 0; s < pal.length; s++){
        html += '<div class="palette-swatch" style="background:' + pal[s].hex + '"></div>';
      }
      html += '</div>';
      html += '<div class="palette-codes">';
      for(var c = 0; c < pal.length; c++){
        html += '<span class="palette-code">' + pal[c].hex + '</span>';
      }
      html += '</div>';
      html += '</div>';
    }
    palettesGrid.innerHTML = html;
  }

  theoryBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      theoryBtns.forEach(function(b){b.classList.remove('active')});
      this.classList.add('active');
      activeTheory = this.getAttribute('data-theory');
      renderPalettes();
    });
  });

  generateBtn.addEventListener('click', renderPalettes);

  // Initial render
  renderPalettes();

  // ───── Photo Theme Inspiration ─────
  var catGrid = document.getElementById('catGrid');
  var photoGrid = document.getElementById('photoGrid');
  var shuffleBtn = document.getElementById('shuffleBtn');
  var activeCategory = 'portrait';

  function loadPhotos(category){
    var html = '';
    for(var i = 0; i < 6; i++){
      var r = Math.floor(Math.random() * 100);
      var seed = category + (r + i);
      html += '<img src="https://picsum.photos/seed/' + seed + '/600/450" alt="' + category + ' photo ' + (i+1) + '" loading="lazy">';
    }
    photoGrid.innerHTML = html;
  }

  catGrid.querySelectorAll('.cat-card').forEach(function(card){
    card.addEventListener('click', function(){
      catGrid.querySelectorAll('.cat-card').forEach(function(c){c.classList.remove('active')});
      this.classList.add('active');
      activeCategory = this.getAttribute('data-category');
      loadPhotos(activeCategory);
    });
  });

  // Activate first category by default
  catGrid.querySelector('.cat-card').classList.add('active');

  shuffleBtn.addEventListener('click', function(){
    loadPhotos(activeCategory);
  });

  // Initial load
  loadPhotos('portrait');

  // ───── Tab Switching ─────
  var tabBtns = document.querySelectorAll('.tab-btn');
  var tabContents = {
    'color': document.getElementById('tab-color'),
    'photo': document.getElementById('tab-photo')
  };

  tabBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      tabBtns.forEach(function(b){b.classList.remove('active')});
      this.classList.add('active');
      var tab = this.getAttribute('data-tab');
      for(var key in tabContents){
        tabContents[key].classList.toggle('active', key === tab);
      }
    });
  });
})();
</script>
</body>
</html>
