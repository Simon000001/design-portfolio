<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Portfolio | Simon GC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;
  --card:#ffffff;
  --border:rgba(0,0,0,0.06);
  --text-heading:#111111;
  --text-body:#666666;
  --transition:0.4s cubic-bezier(0.4,0,0.2,1);
  --shadow:0 2px 12px rgba(0,0,0,0.04);
  --shadow-hover:0 20px 50px rgba(0,0,0,0.08);
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text-body);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
  line-height:1.6;
}
img{max-width:100%;height:auto;display:block}
a{text-decoration:none;color:inherit}

/* ───── Container ───── */
.container{max-width:1200px;margin:0 auto;padding:0 24px}

/* ───── Hero ───── */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:80px 24px;
  position:relative;
}
.hero h1{
  font-size:clamp(3.2rem,10vw,5.5rem);
  font-weight:500;
  letter-spacing:-0.04em;
  color:var(--text-heading);
  line-height:1.05;
  margin-bottom:20px;
  max-width:800px;
}
.hero .tagline{
  font-size:clamp(1rem,1.3vw,1.15rem);
  color:var(--text-body);
  font-weight:400;
  max-width:480px;
  line-height:1.6;
}
.hero .scroll-hint{
  position:absolute;
  bottom:36px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  font-size:11px;
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text-body);
  opacity:0.4;
}
.hero .scroll-hint .line{
  width:1px;
  height:32px;
  background:var(--text-body);
  animation:scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse{
  0%,100%{opacity:0.3;transform:scaleY(0.5)}
  50%{opacity:1;transform:scaleY(1)}
}

/* ───── Grid ───── */
.grid-section{padding:0 24px 80px}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
  max-width:1200px;
  margin:0 auto;
}

/* ───── Card ───── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:all var(--transition);
  box-shadow:var(--shadow);
  opacity:0;
  transform:translateY(30px);
}
.card.visible{opacity:1;transform:translateY(0)}
.card:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow-hover);
}

/* ───── Thumbnail ───── */
.card .thumb{
  width:100%;
  aspect-ratio:16/10;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all var(--transition);
}
.card:hover .thumb{transform:scale(1.02)}

/* ───── Card Body ───── */
.card .body{padding:20px 20px 24px}
.card .body .category{
  display:inline-block;
  font-size:11px;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--text-body);
  margin-bottom:6px;
}
.card .body h3{
  font-size:17px;
  font-weight:500;
  letter-spacing:-0.03em;
  color:var(--text-heading);
  margin-bottom:6px;
  line-height:1.3;
}
.card .body p{
  font-size:13px;
  color:var(--text-body);
  line-height:1.5;
}

/* ───── Viewer Overlay ───── */
.viewer-overlay{
  position:fixed;
  inset:0;
  z-index:9000;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  opacity:0;
  visibility:hidden;
  transition:opacity 0.35s ease,visibility 0.35s ease;
  display:flex;
  flex-direction:column;
}
.viewer-overlay.open{
  opacity:1;
  visibility:visible;
}
.viewer-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
  color:rgba(255,255,255,0.8);
  font-size:14px;
  font-weight:400;
  flex-shrink:0;
}
.viewer-header .viewer-title{font-weight:500;color:#fff}
.viewer-close{
  width:40px;height:40px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.2s;
}
.viewer-close:hover{background:rgba(255,255,255,0.2)}
.viewer-body{
  flex:1;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.viewer-body iframe{
  width:100%;
  height:100%;
  border:none;
  background:#fff;
}
.viewer-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:48px;height:48px;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.2s;
  z-index:10;
}
.viewer-nav svg{width:22px;height:22px;display:block}
.viewer-nav:hover{background:rgba(255,255,255,0.22)}
.viewer-nav.prev{left:24px}
.viewer-nav.next{right:24px}

/* ───── Loading Spinner ───── */
.spinner{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:1;
}
.spinner::after{
  content:'';
  width:32px;height:32px;
  border:2px solid rgba(255,255,255,0.15);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ───── Footer ───── */
footer{
  padding:40px 24px;
  text-align:center;
  border-top:1px solid var(--border);
  font-size:13px;
  color:var(--text-body);
}

/* ───── Responsive ───── */
@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);gap:20px}
}
@media(max-width:600px){
  .grid{grid-template-columns:1fr;gap:18px}
  .grid-section{padding:0 16px 60px}
  .container{padding:0 16px}
  .hero h1{font-size:clamp(2.2rem,12vw,3.2rem)}
  .hero .tagline{font-size:0.95rem}
  .viewer-nav{width:46px;height:46px}
  .viewer-nav svg{width:20px;height:20px}
  .viewer-nav.prev{left:12px}
  .viewer-nav.next{right:12px}
  .viewer-header{padding:12px 16px;font-size:13px}
}
@media(max-width:375px){
  .hero{padding:60px 16px}
  .hero h1{font-size:2rem}
  .card .body{padding:16px}
}

/* ───── Design Style Survey ───── */
.survey-trigger{
  position:fixed;
  bottom:28px;
  right:28px;
  z-index:9999;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 24px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:50px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  cursor:pointer;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:500;
  color:var(--text-heading);
  transition:all var(--transition);
  -webkit-font-smoothing:antialiased;
}
.survey-trigger:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(0,0,0,0.12);
}
.survey-trigger svg{
  width:18px;height:18px;
  flex-shrink:0;
}
.survey-overlay{
  position:fixed;
  inset:0;
  z-index:10000;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transition:opacity 0.35s ease,visibility 0.35s ease;
  padding:20px;
}
.survey-overlay.open{
  opacity:1;
  visibility:visible;
}
.survey-card{
  background:var(--card);
  border-radius:20px;
  max-width:680px;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,0.25);
  position:relative;
  display:flex;
  flex-direction:column;
}
.survey-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 28px 0;
  flex-shrink:0;
}
.survey-progress{
  font-size:13px;
  font-weight:500;
  color:var(--text-body);
  letter-spacing:0.02em;
}
.survey-progress-bar{
  height:3px;
  background:var(--border);
  border-radius:2px;
  margin:12px 28px 0;
  overflow:hidden;
  flex-shrink:0;
}
.survey-progress-fill{
  height:100%;
  background:var(--text-heading);
  border-radius:2px;
  transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
  width:0%;
}
.survey-close{
  width:36px;height:36px;
  border-radius:50%;
  background:transparent;
  border:none;
  color:var(--text-body);
  font-size:22px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.2s,color 0.2s;
  flex-shrink:0;
}
.survey-close:hover{
  background:rgba(0,0,0,0.05);
  color:var(--text-heading);
}
.survey-body{
  padding:28px;
  position:relative;
  overflow:hidden;
  min-height:320px;
  flex:1;
}
.survey-slide{
  display:none;
  animation:surveySlideIn 0.4s cubic-bezier(0.4,0,0.2,1);
}
.survey-slide.active{display:block}
@keyframes surveySlideIn{
  from{opacity:0;transform:translateX(40px)}
  to{opacity:1;transform:translateX(0)}
}
.survey-question{
  font-size:20px;
  font-weight:500;
  color:var(--text-heading);
  margin-bottom:24px;
  letter-spacing:-0.02em;
  line-height:1.3;
}
.survey-options{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.survey-option{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:14px 10px;
  background:var(--card);
  border:2px solid var(--border);
  border-radius:12px;
  cursor:pointer;
  transition:all var(--transition);
  text-align:center;
  -webkit-user-select:none;
  user-select:none;
}
.survey-option:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,0.07);
  border-color:rgba(0,0,0,0.12);
}
.survey-option.selected{
  border-color:var(--text-heading);
  background:rgba(0,0,0,0.02);
  box-shadow:0 4px 16px rgba(0,0,0,0.06);
}
.survey-option-label{
  font-size:13px;
  font-weight:500;
  color:var(--text-heading);
  line-height:1.3;
}
.survey-option-desc{
  font-size:10.5px;
  color:var(--text-body);
  line-height:1.35;
  opacity:0.7;
}
.survey-reference-images{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.survey-reference-thumb{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.survey-reference-thumb img{
  width:auto;
  max-width:120px;
  height:80px;
  border-radius:8px;
  object-fit:cover;
  border:1px solid var(--border);
}
.survey-ref-label{
  font-size:10px;
  font-weight:500;
  color:var(--text-body);
}
.survey-brand-tags{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:24px;
}
.survey-brand-tag{
  padding:4px 12px;
  border-radius:20px;
  background:rgba(0,0,0,0.04);
  border:1px solid var(--border);
  font-size:12px;
  font-weight:500;
  color:var(--text-heading);
}
.survey-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px 20px;
  gap:12px;
  flex-shrink:0;
}
.survey-btn{
  padding:10px 24px;
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
  border:none;
  -webkit-font-smoothing:antialiased;
}
.survey-btn-back{
  background:transparent;
  color:var(--text-body);
  border:1px solid var(--border);
}
.survey-btn-back:hover{
  background:rgba(0,0,0,0.03);
  color:var(--text-heading);
}
.survey-btn-next{
  background:var(--text-heading);
  color:#fff;
  margin-left:auto;
}
.survey-btn-next:hover{background:#000}
.survey-btn-next:disabled{
  opacity:0.35;
  cursor:not-allowed;
}
.survey-results{
  text-align:center;
  padding:10px 0;
}
.survey-badge{
  display:inline-block;
  padding:14px 32px;
  border-radius:12px;
  font-size:24px;
  font-weight:600;
  letter-spacing:-0.02em;
  margin-bottom:16px;
}
.survey-description{
  font-size:15px;
  color:var(--text-body);
  line-height:1.6;
  max-width:520px;
  margin:0 auto 24px;
}
.survey-palette{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:28px;
}
.survey-palette-swatch{
  width:40px;
  height:40px;
  border-radius:8px;
  border:1px solid rgba(0,0,0,0.06);
}
.survey-results-buttons{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
}
.survey-btn-restart{
  padding:10px 24px;
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text-body);
  -webkit-font-smoothing:antialiased;
}
.survey-btn-restart:hover{
  background:rgba(0,0,0,0.03);
  color:var(--text-heading);
}
.survey-btn-close{
  padding:10px 24px;
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
  border:none;
  background:var(--text-heading);
  color:#fff;
  -webkit-font-smoothing:antialiased;
}
.survey-btn-close:hover{background:#000}
@media(max-width:600px){
  .survey-card{border-radius:16px;max-height:95vh}
  .survey-header{padding:16px 20px 0}
  .survey-progress-bar{margin:10px 20px 0}
  .survey-body{padding:20px;min-height:280px}
  .survey-footer{padding:0 20px 16px}
  .survey-question{font-size:18px;margin-bottom:20px}
  .survey-options{gap:10px}
  .survey-option{padding:16px 12px}
  .survey-trigger{bottom:20px;right:20px;padding:10px 18px;font-size:13px}
  .survey-badge{font-size:20px;padding:12px 24px}
}
@media(max-width:480px){
  .survey-options{grid-template-columns:repeat(2,1fr)}
  .survey-question{font-size:16px}
  .survey-option{padding:12px 12px}
}
</style>
</head>
<body>

<!-- ───── Hero ───── -->
<section class="hero">
  <h1>Design Portfolio</h1>
  <p class="tagline">Six website design projects. Each a unique visual language, crafted with precision and purpose.</p>
  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="line"></div>
  </div>
</section>

<!-- ───── Grid ───── -->
<section class="grid-section">
  <div class="grid" id="grid"></div>
</section>

<!-- ───── Viewer Overlay ───── -->
<div class="viewer-overlay" id="viewer">
  <div class="viewer-header">
    <span class="viewer-title" id="viewerTitle">Loading</span>
    <button class="viewer-close" id="viewerClose" aria-label="Close">&times;</button>
  </div>
  <div class="viewer-body" id="viewerBody">
    <div class="spinner"></div>
    <iframe id="viewerIframe" title="Project Preview"></iframe>
    <button class="viewer-nav prev" id="viewerPrev" aria-label="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
    <button class="viewer-nav next" id="viewerNext" aria-label="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
  </div>
</div>

<!-- ───── Survey Trigger ───── -->
<button class="survey-trigger" id="surveyTrigger" aria-label="Discover your style">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
  </svg>
  Discover your style
</button>

<!-- ───── Survey Overlay ───── -->
<div class="survey-overlay" id="surveyOverlay">
  <div class="survey-card">
    <div class="survey-header">
      <span class="survey-progress" id="surveyProgress">Q 1/6</span>
      <button class="survey-close" id="surveyClose" aria-label="Close">&times;</button>
    </div>
    <div class="survey-progress-bar">
      <div class="survey-progress-fill" id="surveyProgressFill"></div>
    </div>
    <div class="survey-body" id="surveyBody"></div>
    <div class="survey-footer" id="surveyFooter">
      <button class="survey-btn survey-btn-back" id="surveyBack" style="visibility:hidden">Back</button>
      <button class="survey-btn survey-btn-next" id="surveyNext" disabled>Next</button>
    </div>
  </div>
</div>

<!-- ───── Footer ───── -->
<footer>
  <p>Simon GC &mdash; 2026</p>
</footer>

<script>
const designs = [
  {id:'business', path:'showcase/business.html', title:'Fauna Robotics', category:'SaaS / Startup', desc:'Modern SaaS landing page with minimal two-color palette, Matter typography, and scroll-triggered feature animations.', accent:'#180102'},
  {id:'ecommerce', path:'showcase/ecommerce.html', title:'Monolith', category:'E-Commerce', desc:'Gallery-style furniture e-commerce with numbered catalog system, cream/near-black minimal palette, and smooth transition effects.', accent:'#28282A'},
  {id:'store', path:'showcase/store.html', title:'Outfit', category:'Store / Retail', desc:'Three-theme product store with interactive image-swap hover, scroll word-splitting hero, and slide-in cart drawer.', accent:'#000000'},
  {id:'cafe', path:'showcase/cafe.html', title:'Escape Coffee', category:'Cafe / Roaster', desc:'Immersive coffee roaster site with split-text scroll reveals, product spec tables, and bilingual EN/FR language toggle.', accent:'#151515'},
  {id:'restaurant', path:'showcase/restaurant.html', title:'Crav Burgers', category:'Restaurant', desc:'Playful burger brand with sticker/decal aesthetic, angled menu cards, mouse-following parallax, and global locations.', accent:'#f91814'},
  {id:'corporate', path:'showcase/corporate.html', title:'Tresmares Capital', category:'Corporate / B2B', desc:'Professional investment firm site with letter-by-letter text reveal, animated stat counters, and interactive office map.', accent:'#D81413'}
];

// ───── Render Cards ─────
const grid = document.getElementById('grid');

designs.forEach(function(d, i){
  var card = document.createElement('div');
  card.className = 'card';
  card.style.transitionDelay = (i * 0.08) + 's';

  var thumb = document.createElement('div');
  thumb.className = 'thumb';
  thumb.style.background = d.accent;

  var img = document.createElement('img');
  img.src = 'showcase/images/thumb-' + d.id + '.jpg';
  img.alt = d.title;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
  thumb.appendChild(img);
  card.appendChild(thumb);

  var body = document.createElement('div');
  body.className = 'body';

  var cat = document.createElement('span');
  cat.className = 'category';
  cat.textContent = d.category;
  body.appendChild(cat);

  var title = document.createElement('h3');
  title.textContent = d.title;
  body.appendChild(title);

  var desc = document.createElement('p');
  desc.textContent = d.desc;
  body.appendChild(desc);

  card.appendChild(body);

  card.addEventListener('click', function(){
    openViewer(i);
  });

  grid.appendChild(card);
});

// ───── IntersectionObserver (Staggered fade-up) ─────
var observer = new IntersectionObserver(function(entries){
  entries.forEach(function(entry){
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });

// ───── Viewer Overlay ─────
var viewer = document.getElementById('viewer');
var viewerTitle = document.getElementById('viewerTitle');
var viewerIframe = document.getElementById('viewerIframe');
var viewerClose = document.getElementById('viewerClose');
var viewerPrev = document.getElementById('viewerPrev');
var viewerNext = document.getElementById('viewerNext');
var spinner = document.querySelector('.spinner');
var currentIndex = 0;

function openViewer(idx){
  currentIndex = idx;
  var d = designs[idx];
  viewerTitle.textContent = d.title;
  spinner.style.display = 'flex';
  viewerIframe.style.opacity = '0';
  viewerIframe.src = d.path;
  viewerIframe.onload = function(){
    spinner.style.display = 'none';
    viewerIframe.style.opacity = '1';
  };
  viewer.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeViewer(){
  viewer.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(function(){
    viewerIframe.src = '';
  }, 350);
}

function navigateViewer(dir){
  var next = currentIndex + dir;
  if(next < 0) next = designs.length - 1;
  if(next >= designs.length) next = 0;
  openViewer(next);
}

viewerClose.addEventListener('click', closeViewer);

viewerPrev.addEventListener('click', function(e){
  e.stopPropagation();
  navigateViewer(-1);
});

viewerNext.addEventListener('click', function(e){
  e.stopPropagation();
  navigateViewer(1);
});

// Keyboard navigation
document.addEventListener('keydown', function(e){
  if(!viewer.classList.contains('open')) return;
  if(e.key === 'Escape') closeViewer();
  if(e.key === 'ArrowLeft') navigateViewer(-1);
  if(e.key === 'ArrowRight') navigateViewer(1);
});

// Click backdrop to close
viewer.addEventListener('click', function(e){
  if(e.target === viewer) closeViewer();
});
