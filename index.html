<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon GC — Electronics Engineer / ML Researcher / Creator</title>
<meta name="description" content="Portfolio of Simon GC — Electronics Engineer, ML Researcher, and Creator. Explore projects in embedded systems, machine learning, robotics, and more.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ========================================================
   DESIGN TOKENS
   ======================================================== */
:root {
  --bg: #ffffff;
  --bg-alt: #f8f8f8;
  --text: #1a1a1a;
  --text-dim: #888888;
  --accent: #ff3366;
  --border: #e8e8e8;
  --card-bg: #ffffff;
  --tag-accent: #ff3366;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --nav-height: 64px;
}

/* ========================================================
   RESET + BASE
   ======================================================== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

::selection {
  background: var(--accent);
  color: #ffffff;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

/* ========================================================
   TYPOGRAPHY
   ======================================================== */
.heading-display {
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.1;
}

.font-mono {
  font-family: var(--font-mono);
}

/* ========================================================
   NAVIGATION
   ======================================================== */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  height: var(--nav-height);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(1.5rem, 4vw, 3rem);
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  transition: height 0.3s ease;
}

.nav.shrink {
  height: 48px;
}

.nav__logo {
  font-family: var(--font-display);
  font-size: clamp(1.25rem, 2vw, 1.5rem);
  font-weight: 700;
  color: var(--text);
}

.nav__links {
  display: flex;
  gap: clamp(0.5rem, 2vw, 1.5rem);
  list-style: none;
}

.nav__link {
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 0.35rem 0;
  color: var(--text-dim);
  transition: color 0.25s ease;
  cursor: pointer;
  background: transparent;
  border: none;
  position: relative;
}

.nav__link::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 1.5px;
  background: var(--accent);
  transition: width 0.25s ease;
}

.nav__link:hover,
.nav__link.active {
  color: var(--text);
}

.nav__link:hover::after,
.nav__link.active::after {
  width: 100%;
}

.nav__hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}

.nav__hamburger span {
  display: block;
  width: 22px;
  height: 1.5px;
  background: var(--text);
  transition: all 0.3s ease;
}

/* ========================================================
   MOBILE NAV
   ======================================================== */
@media (max-width: 768px) {
  .nav__links {
    position: fixed;
    top: var(--nav-height);
    left: 0;
    right: 0;
    flex-direction: column;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 1.5rem;
    gap: 0.5rem;
    border-bottom: 1px solid var(--border);
    transform: translateY(-120%);
    opacity: 0;
    transition: transform 0.35s ease, opacity 0.35s ease;
    pointer-events: none;
  }

  .nav__links.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  .nav__link {
    text-align: center;
    padding: 0.6rem;
  }

  .nav__hamburger {
    display: flex;
  }

  .nav__hamburger.open span:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
  }
  .nav__hamburger.open span:nth-child(2) {
    opacity: 0;
  }
  .nav__hamburger.open span:nth-child(3) {
    transform: rotate(-45deg) translate(5px, -5px);
  }
}

/* ========================================================
   HERO SECTION
   ======================================================== */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: calc(var(--nav-height) + 3rem) clamp(1.5rem, 4vw, 3rem) 4rem;
  background: var(--bg);
  position: relative;
}

.hero__title {
  font-size: clamp(3.5rem, 10vw, 8rem);
  text-align: center;
  color: var(--text);
  font-style: italic;
}

.hero__subtitle {
  font-size: clamp(0.9rem, 1.5vw, 1.1rem);
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 0.04em;
  margin-top: 0.75rem;
  font-weight: 300;
}

/* 3D Canvas Placeholder */
.hero__canvas-container {
  width: min(500px, 85vw);
  height: min(350px, 55vw);
  margin: 3rem auto 0;
  border: 1px dashed var(--border);
  background: var(--bg-alt);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

#three-canvas {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.canvas-label {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

/* ========================================================
   STAT BARS
   ======================================================== */
.stats {
  display: flex;
  gap: 2rem;
  width: 100%;
  max-width: 800px;
  margin: 3rem auto 0;
  flex-wrap: wrap;
  justify-content: center;
}

.stat {
  flex: 1;
  min-width: 160px;
  max-width: 200px;
}

.stat__header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.stat__label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.stat__value {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--accent);
}

.stat__track {
  width: 100%;
  height: 4px;
  background: var(--border);
  position: relative;
  overflow: hidden;
}

.stat__fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ========================================================
   SECTIONS — SHARED
   ======================================================== */
.section {
  padding: clamp(4rem, 8vw, 7rem) clamp(1.5rem, 4vw, 3rem);
  max-width: 1200px;
  margin: 0 auto;
}

.section--alt {
  background: var(--bg-alt);
  max-width: 100%;
  padding-left: 0;
  padding-right: 0;
}

.section--alt .section__inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 clamp(1.5rem, 4vw, 3rem);
}

.section__heading {
  font-size: clamp(2rem, 4vw, 3rem);
  margin-bottom: 3rem;
  position: relative;
  display: inline-block;
  font-style: italic;
  color: var(--text);
}

.section__heading::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 40px;
  height: 2px;
  background: var(--accent);
}

/* ========================================================
   SCROLL REVEAL
   ======================================================== */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ========================================================
   DESIGN SHOWCASE — GRID
   ======================================================== */
.designs-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
}

@media (max-width: 900px) {
  .designs-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .designs-grid { grid-template-columns: 1fr; }
}

.design-card {
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  background: var(--card-bg);
}

.design-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
}

.design-card__thumb {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-bottom: 1px solid var(--border);
  background: var(--bg-alt);
}

.design-card__body {
  padding: 1rem 1.25rem;
}

.design-card__title {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
  color: var(--text);
}

.design-card__category {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ========================================================
   DESIGN VIEWER OVERLAY
   ======================================================== */
.viewer-overlay {
  position: fixed;
  inset: 0;
  z-index: 3000;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.viewer-overlay.active {
  opacity: 1;
  pointer-events: all;
}

.viewer-overlay__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1.5rem;
  background: #111111;
  border-bottom: 1px solid #333333;
  flex-shrink: 0;
}

.viewer-overlay__title {
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 500;
  color: #ffffff;
}

.viewer-overlay__close {
  width: 36px;
  height: 36px;
  background: none;
  border: 1px solid #444444;
  color: #ffffff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 1rem;
  transition: border-color 0.25s ease, color 0.25s ease;
}

.viewer-overlay__close:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.viewer-overlay__body {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.viewer-overlay__iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.viewer-overlay__spinner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 32px;
  height: 32px;
  border: 2px solid #333333;
  border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

.viewer-overlay__nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid #444444;
  color: #ffffff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.25s ease, border-color 0.25s ease;
  z-index: 10;
}

.viewer-overlay__nav-btn:hover {
  background: rgba(0, 0, 0, 0.8);
  border-color: var(--accent);
}

.viewer-overlay__nav-btn--prev {
  left: 1rem;
}

.viewer-overlay__nav-btn--next {
  right: 1rem;
}

/* ========================================================
   PROJECTS SECTION
   ======================================================== */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}

.project-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 1.5rem;
  transition: transform 0.3s ease;
  cursor: default;
}

.project-card:hover {
  transform: translateY(-3px);
}

.project-card__title {
  font-family: var(--font-display);
  font-size: clamp(1.1rem, 2vw, 1.3rem);
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--text);
}

.project-card__desc {
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 1rem;
}

.project-card__tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.2rem 0.5rem;
  border: 1px solid var(--border);
  color: var(--accent);
  transition: border-color 0.25s ease;
}

.project-card:hover .tag {
  border-color: var(--accent);
}

/* ========================================================
   HARDWARE SECTION
   ======================================================== */
.hardware-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 1.5rem;
}

.hardware-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: transform 0.3s ease;
  cursor: default;
}

.hardware-card:hover {
  transform: translateY(-3px);
}

.hardware-card__img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-bottom: 1px solid var(--border);
}

.hardware-card__body {
  padding: 1.25rem;
}

.hardware-card__title {
  font-family: var(--font-display);
  font-size: clamp(1.1rem, 2vw, 1.25rem);
  font-weight: 600;
  margin-bottom: 0.4rem;
  color: var(--text);
}

.hardware-card__desc {
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.5;
}

/* ========================================================
   PHOTO GALLERY
   ======================================================== */
.photos-grid {
  columns: 3;
  column-gap: 1rem;
}

@media (max-width: 768px) {
  .photos-grid { columns: 2; }
}
@media (max-width: 480px) {
  .photos-grid { columns: 1; }
}

.photo-item {
  break-inside: avoid;
  margin-bottom: 1rem;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--border);
}

.photo-item img {
  width: 100%;
  display: block;
  transition: transform 0.4s ease;
}

.photo-item:hover img {
  transform: scale(1.03);
}

.photo-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(0deg, rgba(26, 26, 26, 0.7) 0%, transparent 50%);
  display: flex;
  align-items: flex-end;
  padding: 1rem;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.photo-item:hover .photo-overlay {
  opacity: 1;
}

.photo-overlay__label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #ffffff;
}

/* Lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0, 0, 0, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.lightbox.active {
  opacity: 1;
  pointer-events: all;
}

.lightbox__img {
  max-width: 90vw;
  max-height: 85vh;
  object-fit: contain;
}

.lightbox__close {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  width: 40px;
  height: 40px;
  background: none;
  border: 1px solid #444444;
  color: #ffffff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 1rem;
  transition: border-color 0.25s ease;
}

.lightbox__close:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ========================================================
   VIDEOS SECTION
   ======================================================== */
.videos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 1.5rem;
}

.video-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.video-card:hover {
  transform: translateY(-3px);
}

.video-card__thumb {
  position: relative;
  width: 100%;
  height: 200px;
  overflow: hidden;
}

.video-card__thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.video-card:hover .video-card__thumb img {
  transform: scale(1.03);
}

.video-card__play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 52px;
  height: 52px;
  border: 2px solid rgba(255, 255, 255, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(26, 26, 26, 0.5);
  color: #ffffff;
  transition: all 0.3s ease;
}

.video-card:hover .video-card__play {
  border-color: var(--accent);
  background: rgba(255, 51, 102, 0.2);
}

.video-card__body {
  padding: 1rem 1.25rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.video-card__title {
  font-family: var(--font-display);
  font-size: clamp(0.95rem, 1.5vw, 1.1rem);
  font-weight: 600;
  color: var(--text);
}

.video-card__duration {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}

/* ========================================================
   CONTACT / FOOTER
   ======================================================== */
.contact {
  text-align: center;
  padding: clamp(5rem, 10vw, 8rem) clamp(1.5rem, 4vw, 3rem);
  border-top: 1px solid var(--border);
}

.contact__heading {
  font-size: clamp(2rem, 5vw, 3.5rem);
  margin-bottom: 2rem;
  color: var(--text);
  font-style: italic;
}

.contact__socials {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 3rem;
  flex-wrap: wrap;
}

.social-link {
  width: 44px;
  height: 44px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  color: var(--text-dim);
}

.social-link:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.social-link svg {
  width: 20px;
  height: 20px;
}

.footer {
  padding: 2rem clamp(1.5rem, 4vw, 3rem);
  text-align: center;
  border-top: 1px solid var(--border);
}

.footer__copy {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}

.footer__links {
  margin-top: 0.75rem;
}

.footer__link {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  transition: color 0.25s ease;
}

.footer__link:hover {
  color: var(--accent);
}

/* ========================================================
   VIDEO MODAL
   ======================================================== */
.video-modal {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0, 0, 0, 0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.video-modal.active {
  opacity: 1;
  pointer-events: all;
}

.video-modal__close {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  width: 40px;
  height: 40px;
  background: none;
  border: 1px solid #444444;
  color: #ffffff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 1rem;
  transition: border-color 0.25s ease;
}

.video-modal__close:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.video-modal__title {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  font-weight: 600;
  color: #ffffff;
  margin-bottom: 1rem;
}

.video-modal__placeholder {
  width: min(800px, 90vw);
  height: min(450px, 50vh);
  background: #222222;
  border: 1px solid #444444;
  display: flex;
  align-items: center;
  justify-content: center;
}

.video-modal__placeholder-text {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: #666666;
  letter-spacing: 0.08em;
}

/* ========================================================
   SURVEY — FLOATING TRIGGER
   ======================================================== */

function computeTopAesthetic() {
  var scores = {};
  var keys = Object.keys(AESTHETICS);
  keys.forEach(function(key) { scores[key] = 0; });

  surveyAnswers.forEach(function(answerIndex, questionIndex) {
    keys.forEach(function(key) {
      var w = AESTHETICS[key].weights;
      var idx = questionIndex * 4 + answerIndex;
      if (idx < w.length) {
        scores[key] += w[idx];
      }
    });
  });

  var sorted = keys.map(function(key) {
    return {key: key, score: scores[key]};
  }).sort(function(a, b) { return b.score - a.score; });

  return sorted;
}

  var progress = document.createElement('div');

  for (var p = 0; p < SURVEY_QUESTIONS.length; p++) {
    var dot = document.createElement('div');
    dot.className = 'survey-progress__dot';
    if (p <= surveyStep) dot.classList.add('filled');
    progress.appendChild(dot);
  }
  content.appendChild(progress);

  /* Step label */
  var stepLabel = document.createElement('div');
  stepLabel.className = 'survey-step-label';
  stepLabel.textContent = 'Question ' + (surveyStep + 1) + ' of ' + SURVEY_QUESTIONS.length;
  content.appendChild(stepLabel);

  /* Question */
  var question = document.createElement('div');
  question.className = 'survey-question';
  question.textContent = q.question;
  content.appendChild(question);

  /* Options */
  var options = document.createElement('div');
  options.className = 'survey-options';

  q.options.forEach(function(opt, idx) {
    var btn = document.createElement('button');
    btn.className = 'survey-option';
    btn.textContent = opt;
    if (surveyAnswers[surveyStep] === idx) {
      btn.classList.add('selected');
    }
    btn.addEventListener('click', function() {
      surveyAnswers[surveyStep] = idx;
      options.querySelectorAll('.survey-option').forEach(function(b) {
        b.classList.remove('selected');
      });
      btn.classList.add('selected');
    });
    options.appendChild(btn);
  });

  var actions = document.createElement('div');
  actions.className = 'survey-actions';

  if (surveyStep > 0) {
    var backBtn = document.createElement('button');
    backBtn.className = 'survey-btn';
    backBtn.textContent = 'Back';
    backBtn.addEventListener('click', goBack);
    actions.appendChild(backBtn);
  } else {
    var spacer = document.createElement('div');
    actions.appendChild(spacer);
  }

  var nextBtn = document.createElement('button');
  nextBtn.className = 'survey-btn survey-btn--primary';
  nextBtn.textContent = surveyStep < SURVEY_QUESTIONS.length - 1 ? 'Next' : 'See Results';
  nextBtn.addEventListener('click', goNext);
  actions.appendChild(nextBtn);

  content.appendChild(actions);
}

function renderResults() {
  var content = document.getElementById('survey-content');
  content.replaceChildren();

  var title = document.createElement('h3');
  title.className = 'survey-panel__title';
  title.textContent = 'Your Design Profile';
  content.appendChild(title);

  var subtitle = document.createElement('p');
  subtitle.className = 'survey-panel__subtitle';
  subtitle.textContent = 'Based on your preferences, here are your top design aesthetics.';
  content.appendChild(subtitle);

  var results = computeTopAesthetic();
  var maxScore = results[0].score || 1;

  results.slice(0, 3).forEach(function(result, idx) {
    var aes = AESTHETICS[result.key];
    var card = document.createElement('div');
    card.className = 'survey-result-card';

    var rank = document.createElement('div');
    rank.className = 'survey-result-card__rank';
    var ranks = ['Top Match', '2nd Match', '3rd Match'];
    rank.textContent = ranks[idx];
    card.appendChild(rank);

    var name = document.createElement('div');
    name.className = 'survey-result-card__name';
    name.textContent = aes.name;
    card.appendChild(name);

    var desc = document.createElement('div');
    desc.className = 'survey-result-card__desc';
    desc.textContent = aes.desc;
    card.appendChild(desc);

    var bar = document.createElement('div');
    bar.className = 'survey-result-card__bar';
    var fill = document.createElement('div');
    fill.className = 'survey-result-card__bar-fill';
    bar.appendChild(fill);
    card.appendChild(bar);

    content.appendChild(card);

    /* Animate bar after render */
    setTimeout(function() {
      fill.style.width = Math.round((result.score / maxScore) * 100) + '%';
    }, 100 + idx * 150);
  });

  /* Retake button */
  var actions = document.createElement('div');
  actions.className = 'survey-actions';
  actions.style.marginTop = '1rem';

  var retake = document.createElement('button');
  retake.className = 'survey-btn';
  retake.textContent = 'Retake Survey';
  retake.addEventListener('click', function() {
    surveyAnswers = [];
    surveyStep = 0;
    renderQuestion();
  });
  actions.appendChild(retake);

  var close = document.createElement('button');
  close.className = 'survey-btn survey-btn--primary';
  close.textContent = 'Close';
  close.addEventListener('click', closeSurvey);
  actions.appendChild(close);

  content.appendChild(actions);
}

function goNext() {
  if (surveyAnswers[surveyStep] === undefined) return;
  if (surveyStep < SURVEY_QUESTIONS.length - 1) {
    surveyStep++;
    renderQuestion();
  } else {
    renderResults();
  }
}

function goBack() {
  if (surveyStep > 0) {
    surveyStep--;
    renderQuestion();
  }
}

function openSurvey() {
  document.getElementById('survey-overlay').classList.add('active');
  renderQuestion();
}

function closeSurvey() {
  document.getElementById('survey-overlay').classList.remove('active');
}

/* ==========================================================
   RENDER FUNCTIONS — all use safe DOM APIs
   ========================================================== */

/* --- Stat Bars --- */
function renderStats() {
  var container = document.getElementById('stats');
  STATS.forEach(function(stat) {
    var el = document.createElement('div');
    el.className = 'stat reveal';

    var header = document.createElement('div');
    header.className = 'stat__header';

    var label = document.createElement('span');
    label.className = 'stat__label font-mono';
    label.textContent = stat.label;

    var value = document.createElement('span');
    value.className = 'stat__value font-mono';
    value.textContent = stat.value + '%';

    header.appendChild(label);
    header.appendChild(value);

    var track = document.createElement('div');
    track.className = 'stat__track';

    var fill = document.createElement('div');
    fill.className = 'stat__fill';
    fill.dataset.width = stat.value;

    track.appendChild(fill);
    el.appendChild(header);
    el.appendChild(track);
    container.appendChild(el);
  });
}

/* --- Design Cards --- */
function renderDesigns() {
  var container = document.getElementById('designs-grid');
  DESIGNS.forEach(function(design, i) {
    var card = document.createElement('div');
    card.className = 'design-card reveal';
    card.style.transitionDelay = (i * 60) + 'ms';

    var img = document.createElement('img');
    img.className = 'design-card__thumb';
    img.src = 'showcase/images/thumb-' + design.id + '.jpg';
    img.alt = design.title;
    img.loading = 'lazy';

    var body = document.createElement('div');
    body.className = 'design-card__body';

    var title = document.createElement('h3');
    title.className = 'design-card__title';
    title.textContent = design.title;

    var category = document.createElement('span');
    category.className = 'design-card__category';
    category.textContent = design.category;

    body.appendChild(title);
    body.appendChild(category);
    card.appendChild(img);
    card.appendChild(body);

    card.addEventListener('click', function() {
      openViewer(i);
    });

    container.appendChild(card);
  });
}

/* --- Project Cards --- */
function renderProjects() {
  var container = document.getElementById('projects-grid');
  PROJECTS.forEach(function(proj, i) {
    var card = document.createElement('div');
    card.className = 'project-card reveal';
    card.style.transitionDelay = (i * 80) + 'ms';

    var title = document.createElement('h3');
    title.className = 'project-card__title';
    title.textContent = proj.title;

    var desc = document.createElement('p');
    desc.className = 'project-card__desc';
    desc.textContent = proj.desc;

    var tags = document.createElement('div');
    tags.className = 'project-card__tags';
    proj.tags.forEach(function(t) {
      var tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = t;
      tags.appendChild(tag);
    });

    card.appendChild(title);
    card.appendChild(desc);
    card.appendChild(tags);
    container.appendChild(card);
  });
}

/* --- Hardware Cards --- */
function renderHardware() {
  var container = document.getElementById('hardware-grid');
  HARDWARE.forEach(function(hw, i) {
    var card = document.createElement('div');
    card.className = 'hardware-card reveal';
    card.style.transitionDelay = (i * 100) + 'ms';

    var img = document.createElement('img');
    img.className = 'hardware-card__img';
    img.src = 'https://picsum.photos/seed/' + hw.img + '/600/400';
    img.alt = hw.title;
    img.loading = 'lazy';

    var body = document.createElement('div');
    body.className = 'hardware-card__body';

    var title = document.createElement('h3');
    title.className = 'hardware-card__title';
    title.textContent = hw.title;

    var desc = document.createElement('p');
    desc.className = 'hardware-card__desc';
    desc.textContent = hw.desc;

    body.appendChild(title);
    body.appendChild(desc);
    card.appendChild(img);
    card.appendChild(body);
    container.appendChild(card);

/* --- Photo Gallery --- */
function renderPhotos() {
  var container = document.getElementById('photos-grid');
  PHOTOS.forEach(function(photo, i) {
    var heights = [300, 250, 350, 280, 320, 260, 340, 290, 310];
    var h = heights[i % heights.length];

    var item = document.createElement('div');
    item.className = 'photo-item reveal';
    item.style.transitionDelay = (i * 60) + 'ms';

    var img = document.createElement('img');
    img.src = 'https://picsum.photos/seed/' + photo.src + '/400/' + h;
    img.alt = photo.label;
    img.loading = 'lazy';

    var overlay = document.createElement('div');
    overlay.className = 'photo-overlay';

    var lbl = document.createElement('span');
    lbl.className = 'photo-overlay__label';
    lbl.textContent = photo.label;

    overlay.appendChild(lbl);
    item.appendChild(img);
    item.appendChild(overlay);

    item.addEventListener('click', function() {
      var lb = document.getElementById('lightbox');
      var lbImg = document.getElementById('lightbox-img');
      lbImg.src = 'https://picsum.photos/seed/' + photo.src + '/1200/900';
      lbImg.alt = photo.label;
      lb.classList.add('active');
    });

    container.appendChild(item);

/* --- Video Cards --- */
function renderVideos() {
  var container = document.getElementById('videos-grid');
  VIDEOS.forEach(function(vid, i) {
    var card = document.createElement('div');
    card.className = 'video-card reveal';
    card.style.transitionDelay = (i * 100) + 'ms';

    var thumb = document.createElement('div');
    thumb.className = 'video-card__thumb';

    var img = document.createElement('img');
    img.src = 'https://picsum.photos/seed/' + vid.thumb + '/600/340';
    img.alt = vid.title;
    img.loading = 'lazy';

    var play = document.createElement('div');
    play.className = 'video-card__play';
    play.appendChild(parseSVG(PLAY_SVG));

    thumb.appendChild(img);
    thumb.appendChild(play);

    var body = document.createElement('div');
    body.className = 'video-card__body';

    var title = document.createElement('h3');
    title.className = 'video-card__title';
    title.textContent = vid.title;

    var dur = document.createElement('span');
    dur.className = 'video-card__duration';
    dur.textContent = vid.duration;

    body.appendChild(title);
    body.appendChild(dur);

    card.appendChild(thumb);
    card.appendChild(body);

    card.addEventListener('click', function() {
      var modal = document.getElementById('video-modal');
      var modalTitle = document.getElementById('video-modal-title');
      modalTitle.textContent = vid.title;
      modal.classList.add('active');

/* --- Social Links --- */
function renderSocials() {
  var container = document.getElementById('socials');
  SOCIALS.forEach(function(social) {
    var link = document.createElement('a');
    link.href = '#';
    link.className = 'social-link';
    link.setAttribute('aria-label', social.name);
    link.appendChild(parseSVG(social.svg));
    container.appendChild(link);
  });
}

/* ==========================================================
   DESIGN VIEWER — open/close/navigate
   ========================================================== */
var viewerIndex = 0;

function openViewer(index) {
  viewerIndex = index;
  var overlay = document.getElementById('viewer-overlay');
  var iframe = document.getElementById('viewer-iframe');
  var title = document.getElementById('viewer-title');
  var spinner = document.getElementById('viewer-spinner');

  var design = DESIGNS[viewerIndex];
  title.textContent = design.title + ' — ' + design.category;
  iframe.src = '';
  spinner.style.display = 'block';
  iframe.src = design.path;
  iframe.onload = function() {
    spinner.style.display = 'none';
  };
  overlay.classList.add('active');
}

function closeViewer() {
  var overlay = document.getElementById('viewer-overlay');
  var iframe = document.getElementById('viewer-iframe');
  overlay.classList.remove('active');
  iframe.src = '';
}

function navigateViewer(direction) {
  viewerIndex = (viewerIndex + direction + DESIGNS.length) % DESIGNS.length;
  var iframe = document.getElementById('viewer-iframe');
  var title = document.getElementById('viewer-title');
  var spinner = document.getElementById('viewer-spinner');

  var design = DESIGNS[viewerIndex];
  title.textContent = design.title + ' — ' + design.category;
  spinner.style.display = 'block';
  iframe.src = design.path;
  iframe.onload = function() {
    spinner.style.display = 'none';
  };
}

/* ==========================================================
   INIT RENDER
   ========================================================== */
renderStats();
renderDesigns();
renderProjects();
renderHardware();
renderPhotos();
renderVideos();
renderSocials();

/* ==========================================================
   INTERSECTION OBSERVER — Scroll Reveal + Stat Bars
   ========================================================== */
var revealObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');

      /* Animate stat bars */
      if (entry.target.classList.contains('stat')) {
        var fill = entry.target.querySelector('.stat__fill');
        if (fill) {
          fill.style.width = '0%';
          setTimeout(function() {
            fill.style.width = fill.dataset.width + '%';
          }, 200);
        }
      }

      revealObserver.unobserve(entry.target);
    }
  });
}, {threshold: 0.15});

document.querySelectorAll('.reveal').forEach(function(el) {
  revealObserver.observe(el);
});

/* ==========================================================
   NAV — Shrink on scroll + Active section highlight
   ========================================================== */
var nav = document.getElementById('nav');
var navLinks = document.querySelectorAll('.nav__link');
var sections = document.querySelectorAll('section[id]');

window.addEventListener('scroll', function() {
  /* Shrink nav */
  if (window.scrollY > 80) {
    nav.classList.add('shrink');
  } else {
    nav.classList.remove('shrink');
  }

  /* Active section */
  var scrollPos = window.scrollY + 120;
  sections.forEach(function(section) {
    if (scrollPos >= section.offsetTop && scrollPos < section.offsetTop + section.offsetHeight) {
      var id = section.getAttribute('id');
      navLinks.forEach(function(link) {
        link.classList.remove('active');
        if (link.getAttribute('href') === '#' + id) {
          link.classList.add('active');
        }
      });
    }
  });
}, {passive: true});

/* ==========================================================
   HAMBURGER TOGGLE
   ========================================================== */
var hamburger = document.getElementById('hamburger');
var navLinksContainer = document.getElementById('nav-links');

hamburger.addEventListener('click', function() {
  hamburger.classList.toggle('open');
  navLinksContainer.classList.toggle('open');
});

navLinksContainer.querySelectorAll('.nav__link').forEach(function(link) {
  link.addEventListener('click', function() {
    hamburger.classList.remove('open');
    navLinksContainer.classList.remove('open');
  });
});

/* ==========================================================
   LIGHTBOX
   ========================================================== */
var lightbox = document.getElementById('lightbox');
var lightboxClose = document.getElementById('lightbox-close');

lightboxClose.addEventListener('click', function() {
  lightbox.classList.remove('active');
});

lightbox.addEventListener('click', function(e) {
  if (e.target === lightbox) {
    lightbox.classList.remove('active');
  }
});

/* ==========================================================
   VIDEO MODAL
   ========================================================== */
var videoModal = document.getElementById('video-modal');
var videoModalClose = document.getElementById('video-modal-close');

videoModalClose.addEventListener('click', function() {
  videoModal.classList.remove('active');
});

videoModal.addEventListener('click', function(e) {
  if (e.target === videoModal) {
    videoModal.classList.remove('active');
  }
});

/* ==========================================================
   VIEWER CONTROLS
   ========================================================== */
document.getElementById('viewer-close').addEventListener('click', closeViewer);
document.getElementById('viewer-prev').addEventListener('click', function() { navigateViewer(-1); });
document.getElementById('viewer-next').addEventListener('click', function() { navigateViewer(1); });

/* ==========================================================
   SURVEY CONTROLS
   ========================================================== */
document.getElementById('survey-trigger').addEventListener('click', openSurvey);
document.getElementById('survey-close').addEventListener('click', closeSurvey);
document.getElementById('survey-overlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('survey-overlay')) {
    closeSurvey();
  }
});

/* ==========================================================
   KEYBOARD — Escape, ArrowLeft, ArrowRight
   ========================================================== */
document.addEventListener('keydown', function(e) {
  var viewerActive = document.getElementById('viewer-overlay').classList.contains('active');
  var surveyActive = document.getElementById('survey-overlay').classList.contains('active');

  if (e.key === 'Escape') {
    if (viewerActive) { closeViewer(); return; }
    if (surveyActive) { closeSurvey(); return; }
    lightbox.classList.remove('active');
    videoModal.classList.remove('active');
  }

  if (viewerActive) {
    if (e.key === 'ArrowLeft') { navigateViewer(-1); }
    if (e.key === 'ArrowRight') { navigateViewer(1); }
  }
});
</script>
