<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon GC // Design Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;
  background:#0a0a0a;
  color:#e8e8e8;
  overflow-x:hidden;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale
}

/* ========== GRID/DOT PATTERN BACKGROUND ========== */
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);
  background-size:32px 32px;
  pointer-events:none
}

/* Subtle noise overlay */
body::after{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  opacity:0.015;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;
  background-size:256px 256px;
  pointer-events:none
}

/* ========== APP WRAPPER ========== */
.app{position:relative;z-index:1;min-height:100vh}

/* ========== HERO SECTION ========== */
.hero{
  text-align:center;
  padding:120px 24px 80px;
  position:relative
}
.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 20px;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:100px;
  font-size:13px;
  font-weight:500;
  letter-spacing:0.05em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.5);
  margin-bottom:48px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(12px)
}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:#5b9aff;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}
.hero h1{
  font-size:clamp(48px,10vw,96px);
  font-weight:800;
  letter-spacing:-0.04em;
  line-height:1.05;
  margin-bottom:24px;
  background:linear-gradient(135deg,#ffffff 0%,#8ab4ff 50%,#c084fc 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:fade-up 0.8s ease-out
}
.hero p{
  font-size:clamp(16px,2vw,20px);
  color:rgba(255,255,255,0.5);
  font-weight:400;
  line-height:1.6;
  max-width:560px;
  margin:0 auto;
  animation:fade-up 0.8s ease-out 0.15s both
}
@keyframes fade-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ========== GRID ========== */
.grid-section{
  max-width:1400px;
  margin:0 auto;
  padding:0 24px 120px
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px
}
@media(max-width:1024px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid{grid-template-columns:1fr;gap:20px}}

/* ========== CARD ========== */
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  position:relative;
  animation:fade-up 0.6s ease-out both
}
.card:hover{
  transform:translateY(-4px);
  border-color:rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05);
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05)
}
.card:active{transform:translateY(-2px) scale(0.99)}
.card:nth-child(1){animation-delay:0.05s}
.card:nth-child(2){animation-delay:0.1s}
.card:nth-child(3){animation-delay:0.15s}
.card:nth-child(4){animation-delay:0.2s}
.card:nth-child(5){animation-delay:0.25s}
.card:nth-child(6){animation-delay:0.3s}

/* Preview area (screenshot-like) */
.card-preview{
  position:relative;
  width:100%;
  aspect-ratio:16/10;
  background:linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center
}
.card-preview::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent 60%, rgba(10,10,10,0.8) 100%);
  pointer-events:none
}
/* Browser chrome dots */
.card-preview .chrome-dots{
  position:absolute;
  top:12px;
  left:14px;
  display:flex;
  gap:6px;
  z-index:2;
  opacity:0.5
}
.card-preview .chrome-dots span{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.2)
}
.card-preview .chrome-dots span:nth-child(1){background:#ff5f57}
.card-preview .chrome-dots span:nth-child(2){background:#febc2e}
.card-preview .chrome-dots span:nth-child(3){background:#28c840}

.preview-content{
  position:relative;
  z-index:1;
  width:90%;
  height:85%;
  border-radius:8px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:16px;
  overflow:hidden
}
.preview-content .preview-icon{
  font-size:28px;
  opacity:0.3;
  filter:grayscale(1);
  margin-bottom:4px
}
.preview-content .preview-bar{
  width:60%;
  height:6px;
  border-radius:3px;
  background:rgba(255,255,255,0.06)
}
.preview-content .preview-bar:nth-child(3){width:45%}
.preview-content .preview-bar:nth-child(4){width:35%}
.preview-content .preview-block{
  display:flex;
  gap:8px;
  width:80%;
  margin-top:8px
}
.preview-content .preview-block div{
  height:40px;
  border-radius:4px;
  background:rgba(255,255,255,0.04);
  flex:1
}
.preview-content .preview-block div:nth-child(2){flex:2}

/* Card body */
.card-body{
  padding:20px 24px 24px
}
.card-category{
  display:inline-block;
  font-size:11px;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:4px 12px;
  border-radius:100px;
  background:rgba(91,154,255,0.1);
  color:#5b9aff;
  margin-bottom:12px
}
.card-title{
  font-size:18px;
  font-weight:700;
  letter-spacing:-0.02em;
  color:#fff;
  margin-bottom:8px;
  line-height:1.3
}
.card-desc{
  font-size:14px;
  color:rgba(255,255,255,0.45);
  line-height:1.6;
  font-weight:400
}
.card-number{
  position:absolute;
  top:16px;
  right:20px;
  font-size:13px;
  font-weight:700;
  color:rgba(255,255,255,0.08);
  letter-spacing:-0.02em;
  font-feature-settings:"tnum"
}

/* ========== OVERLAY / FULL-PAGE VIEWER ========== */
.viewer-overlay{
  position:fixed;
  inset:0;
  z-index:100;
  background:#0a0a0a;
  display:none;
  flex-direction:column;
  opacity:0;
  transition:opacity 0.4s ease
}
.viewer-overlay.active{
  display:flex;
  opacity:1
}

.viewer-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 20px;
  background:rgba(255,255,255,0.02);
  border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  z-index:101;
  flex-shrink:0
}
.viewer-header .viewer-title{
  font-size:14px;
  font-weight:600;
  color:rgba(255,255,255,0.7);
  letter-spacing:-0.01em
}
.viewer-header .viewer-actions{
  display:flex;
  gap:8px
}
.viewer-header .viewer-actions button{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.7);
  width:36px;
  height:36px;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.25s ease;
  font-family:inherit
}
.viewer-header .viewer-actions button:hover{
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.15);
  color:#fff
}
.viewer-header .viewer-actions .exit-btn{
  background:rgba(255,75,75,0.12);
  border-color:rgba(255,75,75,0.2);
  color:#ff5f57
}
.viewer-header .viewer-actions .exit-btn:hover{
  background:rgba(255,75,75,0.2);
  border-color:rgba(255,75,75,0.3)
}

.viewer-iframe-wrap{
  flex:1;
  position:relative;
  overflow:hidden
}
.viewer-iframe-wrap iframe{
  width:100%;
  height:100%;
  border:none;
  background:#fff
}
.viewer-loading{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a0a;
  z-index:2;
  transition:opacity 0.5s ease
}
.viewer-loading.hidden{
  opacity:0;
  pointer-events:none
}
.viewer-loading .spinner{
  width:32px;
  height:32px;
  border:2px solid rgba(255,255,255,0.06);
  border-top-color:#5b9aff;
  border-radius:50%;
  animation:spin 0.7s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ========== BOTTOM NAV BAR ========== */
.bottom-nav{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  z-index:102;
  display:none;
  align-items:center;
  gap:6px;
  padding:8px 16px;
  background:rgba(20,20,20,0.85);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:0 8px 32px rgba(0,0,0,0.6)
}
.bottom-nav.active{display:flex}
.bottom-nav .nav-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:none;
  cursor:pointer;
  padding:0;
  transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
  position:relative
}
.bottom-nav .nav-dot.active{
  background:#5b9aff;
  transform:scale(1.3);
  box-shadow:0 0 12px rgba(91,154,255,0.4)
}
.bottom-nav .nav-dot:hover:not(.active){
  background:rgba(255,255,255,0.3);
  transform:scale(1.15)
}
.bottom-nav .nav-label{
  font-size:12px;
  font-weight:500;
  color:rgba(255,255,255,0.5);
  margin:0 8px;
  white-space:nowrap;
  max-width:160px;
  overflow:hidden;
  text-overflow:ellipsis
}
.bottom-nav .nav-separator{
  width:1px;
  height:16px;
  background:rgba(255,255,255,0.08);
  margin:0 4px
}
.bottom-nav .nav-arrow{
  background:none;
  border:none;
  color:rgba(255,255,255,0.4);
  cursor:pointer;
  padding:4px 6px;
  font-size:14px;
  transition:color 0.2s;
  font-family:inherit;
  display:flex;
  align-items:center;
  justify-content:center
}
.bottom-nav .nav-arrow:hover{color:#fff}
.bottom-nav .nav-arrow:disabled{opacity:0.2;cursor:default}

/* ========== RESPONSIVE ========== */
@media(max-width:640px){
  .hero{padding:80px 20px 48px}
  .hero h1{font-size:42px}
  .card-body{padding:16px 20px 20px}
  .card-title{font-size:16px}
  .viewer-header{padding:10px 14px}
  .viewer-header .viewer-title{font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bottom-nav{padding:6px 12px;gap:4px}
  .bottom-nav .nav-label{display:none}
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- HERO -->
  <section class="hero">
    <div class="hero-badge">
      <span class="dot"></span>
      Simon GC // Design Portfolio
    </div>
    <h1>Web Design Portfolio</h1>
    <p>A curated collection of six distinct website concepts — each exploring a unique design language, interaction model, and visual identity.</p>
  </section>

  <!-- GRID -->
  <section class="grid-section">
    <div class="grid" id="cardGrid">
      <!-- Cards injected by JS -->
    </div>
  </section>
</div>

<!-- VIEWER OVERLAY -->
<div class="viewer-overlay" id="viewerOverlay">
  <div class="viewer-header">
    <span class="viewer-title" id="viewerTitle">Design Preview</span>
    <div class="viewer-actions">
      <button id="prevBtn" title="Previous" aria-label="Previous design">&#8592;</button>
      <button id="nextBtn" title="Next" aria-label="Next design">&#8594;</button>
      <button class="exit-btn" id="exitBtn" title="Close viewer" aria-label="Close viewer">&#x2715;</button>
    </div>
  </div>
  <div class="viewer-iframe-wrap">
    <div class="viewer-loading" id="viewerLoading">
      <div class="spinner"></div>
    </div>
    <iframe id="viewerIframe" title="Design Preview" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav">
  <button class="nav-arrow" id="navPrevBtn" aria-label="Previous">&#8592;</button>
  <div class="nav-separator"></div>
  <span class="nav-label" id="navLabel">1 / 6</span>
  <div id="navDots"></div>
  <div class="nav-separator"></div>
  <button class="nav-arrow" id="navNextBtn" aria-label="Next">&#8594;</button>
</div>

<script>
(function(){
  'use strict';

  // ========== DESIGN DATA ==========
  const designs = [
    {
      id: 'business',
      path: 'showcase/business.html',
      title: 'NOVA // SaaS Platform',
      category: 'Business / Startup',
      desc: 'A modern SaaS landing page with gradient mesh hero, metrics strip, pricing grid, and testimonial carousel. Navy base with electric blue accents.',
      icon: '◆',
      colors: ['#0a0e27','#16213e','#4f6ef7','#00d4aa']
    },
    {
      id: 'ecommerce',
      path: 'showcase/ecommerce.html',
      title: 'MØNA // Product Store',
      category: 'E-Commerce',
      desc: 'Minimal product showcase with 4-column grid, color swatches, quick-add hover effects, and newsletter signup. Clean white base with warm coral accent.',
      icon: '◈',
      colors: ['#fafafa','#f5f5f5','#f05a4d','#1a1a1a']
    },
    {
      id: 'store',
      path: 'showcase/store.html',
      title: 'ATELIER // Retail Boutique',
      category: 'Store / Retail',
      desc: 'Physical retail store concept with horizontal scroll categories, shop-the-look grid, and sustainability values. Cream base with sage green & terracotta.',
      icon: '⊹',
      colors: ['#faf8f5','#7a9b7a','#c9684e','#2c3e2c']
    },
    {
      id: 'cafe',
      path: 'showcase/cafe.html',
      title: 'ROAST // Artisan Cafe',
      category: 'Cafe / Coffee',
      desc: 'Warm, intimate coffee shop design with menu grid, daily specials, cozy gallery, and location card. Beige and charcoal with warm brown accents.',
      icon: '✦',
      colors: ['#f5e6d3','#8b6f47','#2c1810','#d4a373']
    },
    {
      id: 'restaurant',
      path: 'showcase/restaurant.html',
      title: 'GEM // Fine Dining',
      category: 'Restaurant',
      desc: 'Upscale dining site with fullscreen hero, hover-reveal menu, reservation form, wine accordion, and chef story. Deep warm tones with gold accents.',
      icon: '★',
      colors: ['#1a0f0a','#c9a84c','#f5f0e8','#3d2b1f']
    },
    {
      id: 'corporate',
      path: 'showcase/corporate.html',
      title: 'MERIDIAN // Corporate',
      category: 'Corporate / B2B',
      desc: 'Professional corporate site with services grid, case studies, leadership team, contact forms, and metrics strip. Navy, silver, and trust blue.',
      icon: '▣',
      colors: ['#0a1628','#2d6bff','#c0c8d4','#1e3a5f']
    }
  ];

  // ========== DOM REFS ==========
  const grid = document.getElementById('cardGrid');
  const overlay = document.getElementById('viewerOverlay');
  const iframe = document.getElementById('viewerIframe');
  const viewerTitle = document.getElementById('viewerTitle');
  const loading = document.getElementById('viewerLoading');
  const exitBtn = document.getElementById('exitBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const bottomNav = document.getElementById('bottomNav');
  const navDots = document.getElementById('navDots');
  const navLabel = document.getElementById('navLabel');
  const navPrevBtn = document.getElementById('navPrevBtn');
  const navNextBtn = document.getElementById('navNextBtn');

  let currentIndex = -1;
  let isTransitioning = false;

  // ========== BUILD CARDS ==========
  designs.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.style.animationDelay = `${0.05 + i * 0.05}s`;

    card.innerHTML = `
      <div class="card-preview" style="background:linear-gradient(135deg, ${d.colors[1]}22 0%, ${d.colors[2]}11 100%)">
        <div class="chrome-dots">
          <span></span><span></span><span></span>
        </div>
        <div class="preview-content" style="border-color:rgba(255,255,255,0.06)">
          <div class="preview-icon">${d.icon}</div>
          <div class="preview-bar" style="background:${d.colors[2]}33"></div>
          <div class="preview-bar" style="background:${d.colors[2]}22"></div>
          <div class="preview-bar" style="background:${d.colors[2]}18"></div>
          <div class="preview-block">
            <div style="background:${d.colors[2]}22"></div>
            <div style="background:${d.colors[2]}15"></div>
          </div>
        </div>
      </div>
      <div class="card-body">
        <span class="card-category" style="background:${d.colors[2]}22;color:${d.colors[2]}">${d.category}</span>
        <h3 class="card-title">${d.title}</h3>
        <p class="card-desc">${d.desc}</p>
      </div>
      <span class="card-number">${String(i + 1).padStart(2, '0')}</span>
    `;

    card.addEventListener('click', () => openViewer(i));
    grid.appendChild(card);
  });

  // ========== BUILD NAV DOTS ==========
  designs.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot';
    dot.dataset.index = i;
    dot.setAttribute('aria-label', `Show design ${i + 1}`);
    dot.addEventListener('click', () => openViewer(i));
    navDots.appendChild(dot);
  });

  // ========== OPEN VIEWER ==========
  function openViewer(index) {
    if (isTransitioning || index === currentIndex) return;
    isTransitioning = true;
    currentIndex = index;
    const d = designs[index];

    viewerTitle.textContent = d.title;
    navLabel.textContent = `${index + 1} / ${designs.length}`;

    // Update dots
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === index);
    });

    // Show overlay with animation
    overlay.classList.add('active');
    bottomNav.classList.add('active');

    // Show loading, then load iframe
    loading.classList.remove('hidden');
    iframe.src = d.path;

    // Hide loading when iframe loads
    iframe.onload = () => {
      loading.classList.add('hidden');
      isTransitioning = false;
    };
    // Fallback timeout
    setTimeout(() => {
      loading.classList.add('hidden');
      isTransitioning = false;
    }, 4000);
  }

  // ========== CLOSE VIEWER ==========
  function closeViewer() {
    currentIndex = -1;
    overlay.classList.remove('active');
    bottomNav.classList.remove('active');
    // Delay clearing iframe to allow transition to play
    setTimeout(() => {
      iframe.src = 'about:blank';
      loading.classList.add('hidden');
    }, 300);
  }

  // ========== NAVIGATION ==========
  function prevDesign() {
    if (currentIndex > 0) openViewer(currentIndex - 1);
  }
  function nextDesign() {
    if (currentIndex < designs.length - 1) openViewer(currentIndex + 1);
  }

  // ========== EVENT LISTENERS ==========
  exitBtn.addEventListener('click', closeViewer);
  prevBtn.addEventListener('click', prevDesign);
  nextBtn.addEventListener('click', nextDesign);
  navPrevBtn.addEventListener('click', prevDesign);
  navNextBtn.addEventListener('click', nextDesign);

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!overlay.classList.contains('active')) return;
    if (e.key === 'Escape') closeViewer();
    if (e.key === 'ArrowLeft') prevDesign();
    if (e.key === 'ArrowRight') nextDesign();
  });

  // Swipe support for touch devices
  let touchStartX = 0;
  overlay.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, {passive: true});
  overlay.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].screenX;
    if (Math.abs(diff) > 60) {
      if (diff > 0) nextDesign();
      else prevDesign();
    }
  }, {passive: true});

})();
</script>
</body>
</html>
